<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevKit - 开发者常用工具集</title>
  <meta name="description" content="免费在线开发者工具：JSON 格式化、正则测试、Base64 编解码、时间戳转换、颜色转换、JWT 解析、文本处理。全本地运行，无需登录。">
  <meta name="keywords" content="JSON格式化,正则测试,Base64,时间戳,JWT,颜色转换,开发者工具,在线工具">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='6' y='23' font-size='18'>⚡</text></svg>">
</head>
<body>

<!-- ===== 顶部导航 ===== -->
<nav class="navbar">
  <a class="navbar-brand" href="#" onclick="return false">
    <div class="logo">⚡</div>
    <span class="brand-name">DevKit</span>
  </a>
  <div class="navbar-actions">
    <a class="nav-link" href="https://github.com/swordmaster-sgw/ToolKit" target="_blank" rel="noopener">GitHub</a>
  </div>
</nav>

<!-- ===== 主内容 ===== -->
<main id="main-content">
  <!-- Hero -->
  <div class="hero">
    <h1>开发者<span class="gradient-text">工具集</span></h1>
    <p class="hero-desc">免费、开源、全本地运行的开发者常用工具</p>

    <!-- 搜索 -->
    <div class="hero-search">
      <span class="search-icon">🔍</span>
      <input
        id="search-input"
        class="search-input"
        type="text"
        placeholder="搜索工具… (Ctrl+K)"
        autocomplete="off"
      />
    </div>

    <!-- 分类筛选 -->
    <div id="category-tabs" class="category-tabs"></div>
  </div>

  <!-- 工具列表 -->
  <div class="tools-section">
    <div class="tools-section-header">
      <span class="section-title" id="tools-count">加载中…</span>
      <div class="view-toggle">
        <button class="view-btn active" data-mode="grid" onclick="setViewMode('grid')" title="网格视图">⊞</button>
        <button class="view-btn" data-mode="list" onclick="setViewMode('list')" title="列表视图">≡</button>
      </div>
    </div>
    <div id="tools-grid" class="tools-grid">
      <div style="height:180px" class="skeleton"></div>
      <div style="height:180px" class="skeleton"></div>
      <div style="height:180px" class="skeleton"></div>
    </div>
  </div>
</main>

<!-- ===== 页脚 ===== -->
<footer>
  <div class="footer-inner">
    <p>DevKit · 免费开源开发者工具集 · 所有数据均在本地处理</p>
    <p class="footer-links">
      <a href="https://github.com/swordmaster-sgw/ToolKit" target="_blank" rel="noopener">GitHub</a>
      <span>·</span>
      <span>全本地运行，无需登录，无数据上传</span>
    </p>
  </div>
</footer>

<!-- ===== Toast 通知 ===== -->
<div id="toast" class="toast"></div>

<script src="./assets/js/app.js"></script>
</body>
</html>
