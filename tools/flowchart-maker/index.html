<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流程图制作 (Mermaid)</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { margin-left: auto; padding: 6px 14px; background: transparent; border: 1px solid #2d3148; color: #8b90a7; border-radius: 6px; font-size: 13px; text-decoration: none; transition: all .2s; }
    .back-btn:hover { border-color: #6366f1; color: #6366f1; }
    .main { padding: 20px; max-width: 1200px; margin: 0 auto; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 10px; overflow: hidden; }
    .card-title { padding: 10px 16px; background: #1f2235; font-size: 12px; font-weight: 600; color: #8b90a7; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #2d3148; }
    .card-body { padding: 16px; }
    textarea { width: 100%; background: #131520; color: #e2e8f0; border: 1px solid #363b5e; border-radius: 6px; padding: 12px; font-family: 'Cascadia Code', monospace; font-size: 12px; resize: vertical; outline: none; min-height: 200px; transition: border-color .2s; }
    textarea:focus { border-color: #6366f1; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #5457d4; }
    .btn-secondary { background: #2d3148; color: #c4c9e2; }
    .btn-secondary:hover { background: #363b5e; }
    .preview { background: #131520; border-radius: 6px; padding: 16px; max-height: 400px; overflow: auto; }
    .mermaid { background: #131520; }
    @media (max-width: 768px) { .grid2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="header">
  <span style="font-size:22px">🔀</span>
  <div>
    <h1 style="font-size:16px;font-weight:600">流程图制作 (Mermaid)</h1>
    <p style="font-size:12px;color:#8b90a7;margin-top:2px">文本描述生成流程图，实时预览</p>
  </div>
  <a class="back-btn" href="../../index.html">← 返回工具集</a>
</div>

<div class="main">
  <div class="grid2">
    <div class="card">
      <div class="card-title">Mermaid 语法</div>
      <div class="card-body">
        <textarea id="mermaid-input" placeholder="输入 Mermaid 语法...">flowchart TD
    A[开始] --> B{条件检查}
    B -->|是| C[执行操作]
    B -->|否| D[结束]
    C --> E[返回结果]
    E --> D</textarea>
        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="render()">🔄 渲染</button>
          <button class="btn btn-secondary" onclick="loadSample()">📋 示例</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">预览</div>
      <div class="card-body">
        <div class="preview" id="preview">
          <div class="mermaid" id="mermaid-preview"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <div class="card-title">Mermaid 语法速查</div>
    <div class="card-body" style="font-size:12px;line-height:1.8;color:#8b90a7">
      <div style="margin-bottom:12px">
        <strong style="color:#6366f1">流程图（Flowchart）</strong><br>
        <code style="background:#131520;padding:2px 4px;border-radius:2px">flowchart TD</code> 或 <code style="background:#131520;padding:2px 4px;border-radius:2px">graph LR</code>
        <br>方向: TD (从上到下) / LR (从左到右) / BT / RL
      </div>
      <div style="margin-bottom:12px">
        <strong style="color:#6366f1">节点语法</strong><br>
        <code style="background:#131520;padding:2px 4px">A[方框]</code> | 
        <code style="background:#131520;padding:2px 4px">B{菱形}</code> | 
        <code style="background:#131520;padding:2px 4px">C(圆形)</code>
      </div>
      <div>
        <strong style="color:#6366f1">连接语法</strong><br>
        <code style="background:#131520;padding:2px 4px">A --> B</code> 直接连接<br>
        <code style="background:#131520;padding:2px 4px">A -->|标签| B</code> 带标签连接
      </div>
    </div>
  </div>
</div>

<script>
mermaid.initialize({ startOnLoad: true, theme: 'dark' });

function render() {
  const code = document.getElementById('mermaid-input').value;
  const preview = document.getElementById('mermaid-preview');
  try {
    preview.textContent = code;
    mermaid.contentLoaded();
  } catch (e) {
    preview.textContent = '❌ 语法错误: ' + e.message;
  }
}

function loadSample() {
  document.getElementById('mermaid-input').value = `graph TD
    A[用户请求] --> B{认证检查}
    B -->|失败| C[返回 401]
    B -->|成功| D[查询数据库]
    D --> E{数据存在?}
    E -->|是| F[返回数据]
    E -->|否| G[返回 404]
    F --> H[记录日志]
    G --> H
    C --> H
    H --> I[响应完成]`;
  render();
}

// 初始化
render();
</script>
</body>
</html>
