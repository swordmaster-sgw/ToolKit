<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 接口文档模板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { margin-left: auto; padding: 6px 14px; background: transparent; border: 1px solid #2d3148; color: #8b90a7; border-radius: 6px; font-size: 13px; text-decoration: none; transition: all .2s; }
    .back-btn:hover { border-color: #6366f1; color: #6366f1; }
    .main { padding: 20px; max-width: 1000px; margin: 0 auto; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
    .card-title { padding: 10px 16px; background: #1f2235; font-size: 12px; font-weight: 600; color: #8b90a7; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #2d3148; }
    .card-body { padding: 16px; }
    .input-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .input { flex: 1; background: #131520; border: 1px solid #363b5e; border-radius: 6px; padding: 8px 12px; color: #e2e8f0; font-size: 13px; outline: none; min-width: 150px; }
    .input:focus { border-color: #6366f1; }
    textarea { width: 100%; background: #131520; color: #e2e8f0; border: 1px solid #363b5e; border-radius: 6px; padding: 12px; font-family: 'Cascadia Code', monospace; font-size: 12px; resize: vertical; outline: none; min-height: 100px; transition: border-color .2s; }
    textarea:focus { border-color: #6366f1; }
    .btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #5457d4; }
    .btn-secondary { background: #2d3148; color: #c4c9e2; }
    .btn-secondary:hover { background: #363b5e; }
    .copy-btn { padding: 3px 10px; background: #2d3148; border: none; border-radius: 4px; color: #8b90a7; cursor: pointer; font-size: 11px; }
    .copy-btn:hover { background: #6366f1; color: #fff; }
  </style>
</head>
<body>
<div class="header">
  <span style="font-size:22px">🔌</span>
  <div>
    <h1 style="font-size:16px;font-weight:600">API 接口文档模板</h1>
    <p style="font-size:12px;color:#8b90a7;margin-top:2px">快速生成标准 API 文档</p>
  </div>
  <a class="back-btn" href="../../index.html">← 返回工具集</a>
</div>

<div class="main">
  <div class="card">
    <div class="card-title">接口信息</div>
    <div class="card-body">
      <div class="input-row">
        <select class="input" id="method" style="width:100px">
          <option>GET</option>
          <option>POST</option>
          <option>PUT</option>
          <option>DELETE</option>
          <option>PATCH</option>
        </select>
        <input class="input" id="path" placeholder="接口路径 (如: /api/v1/users/{id})">
      </div>
      <div class="input-row">
        <input class="input" id="name" placeholder="接口名称" style="flex:1">
        <input class="input" id="version" placeholder="版本" style="width:100px">
      </div>
      <div class="input-row">
        <input class="input" id="desc" placeholder="接口描述" style="width:100%">
      </div>
      
      <div style="margin-top:16px">
        <label style="font-size:12px;color:#8b90a7;font-weight:600">请求参数示例</label>
        <textarea id="req-params" placeholder='{"userId": 123, "name": "张三"}'></textarea>
      </div>

      <div style="margin-top:12px">
        <label style="font-size:12px;color:#8b90a7;font-weight:600">响应示例</label>
        <textarea id="res-params" placeholder='{"code": 200, "data": {...}, "msg": "成功"}'></textarea>
      </div>

      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn btn-primary" onclick="generate()">📝 生成文档</button>
        <button class="btn btn-secondary" onclick="loadSample()">📋 示例</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      文档预览
      <button class="copy-btn" onclick="copyDoc()">复制</button>
    </div>
    <div class="card-body">
      <textarea id="doc" readonly placeholder="生成的文档将显示在此..."></textarea>
    </div>
  </div>
</div>

<script>
function generate() {
  const method = document.getElementById('method').value;
  const path = document.getElementById('path').value || '/api/endpoint';
  const name = document.getElementById('name').value || '接口';
  const version = document.getElementById('version').value || '1.0';
  const desc = document.getElementById('desc').value || '接口描述';
  const reqParams = document.getElementById('req-params').value;
  const resParams = document.getElementById('res-params').value;

  const doc = `# ${name}

**版本**: ${version}  
**方法**: ${method}  
**路径**: \`${path}\`

## 描述
${desc}

## 请求

### 参数
\`\`\`json
${reqParams}
\`\`\`

## 响应

### 成功 (200)
\`\`\`json
${resParams}
\`\`\`

### 错误 (400/401/500)
\`\`\`json
{
  "code": 400,
  "msg": "错误信息"
}
\`\`\`

## 备注
- 需要身份认证
- 响应时间: < 500ms`;

  document.getElementById('doc').value = doc;
}

function loadSample() {
  document.getElementById('method').value = 'POST';
  document.getElementById('path').value = '/api/v1/users';
  document.getElementById('name').value = '创建用户';
  document.getElementById('version').value = '1.0.0';
  document.getElementById('desc').value = '创建新用户账户';
  document.getElementById('req-params').value = JSON.stringify({name: "张三", email: "zhangsan@example.com", role: "user"}, null, 2);
  document.getElementById('res-params').value = JSON.stringify({code: 200, data: {userId: 123, name: "张三"}, msg: "创建成功"}, null, 2);
  generate();
}

function copyDoc() {
  const v = document.getElementById('doc').value;
  navigator.clipboard.writeText(v).then(() => {
    const btn = event.target;
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = '复制', 1200);
  });
}
</script>
</body>
</html>
