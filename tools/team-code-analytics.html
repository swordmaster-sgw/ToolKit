<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队代码影响力分析器 - ToolKit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(94, 234, 212, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #5eead4 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.1em;
            color: #94a3b8;
            max-width: 600px;
            margin: 0 auto;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex: 1;
            min-width: 300px;
        }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(94, 234, 212, 0.2);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #5eead4;
            box-shadow: 0 0 0 3px rgba(94, 234, 212, 0.1);
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #0ea5e9 0%, #0d9488 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.3);
        }

        .btn-secondary {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(94, 234, 212, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(30, 41, 59, 0.9);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(94, 234, 212, 0.1);
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(94, 234, 212, 0.3);
        }

        .card-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #5eead4;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .metric-item {
            background: rgba(30, 41, 59, 0.5);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(94, 234, 212, 0.1);
        }

        .metric-label {
            font-size: 0.9em;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #f8fafc;
        }

        .metric-change {
            font-size: 0.8em;
            margin-top: 3px;
        }

        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        .neutral { color: #f59e0b; }

        .chart-container {
            height: 300px;
            margin: 20px 0;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 10px;
            padding: 15px;
            position: relative;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .member-card {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid rgba(94, 234, 212, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .member-card:hover {
            transform: translateY(-3px);
            border-color: rgba(94, 234, 212, 0.3);
        }

        .member-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .member-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0ea5e9 0%, #0d9488 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
        }

        .member-info h3 {
            font-size: 1.1em;
            margin-bottom: 3px;
        }

        .member-info p {
            font-size: 0.85em;
            color: #94a3b8;
        }

        .member-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 8px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 8px;
        }

        .stat-value {
            font-size: 1.2em;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.75em;
            color: #94a3b8;
            margin-top: 2px;
        }

        .risk-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 500;
        }

        .risk-low { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .risk-medium { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .risk-high { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .knowledge-graph {
            height: 400px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 10px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .graph-node {
            position: absolute;
            background: rgba(94, 234, 212, 0.1);
            border: 1px solid rgba(94, 234, 212, 0.3);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .graph-node:hover {
            background: rgba(94, 234, 212, 0.2);
            transform: scale(1.1);
        }

        .graph-line {
            position: absolute;
            height: 1px;
            background: rgba(94, 234, 212, 0.2);
            transform-origin: left center;
        }

        .week-report {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid rgba(94, 234, 212, 0.1);
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(94, 234, 212, 0.1);
        }

        .report-content {
            line-height: 1.8;
            color: #cbd5e1;
        }

        .report-content h3 {
            color: #5eead4;
            margin: 15px 0 10px 0;
            font-size: 1.1em;
        }

        .report-content ul {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .report-content li {
            margin-bottom: 8px;
        }

        .highlight {
            background: rgba(94, 234, 212, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            color: #5eead4;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            color: #f8fafc;
            padding: 16px 24px;
            border-radius: 10px;
            border: 1px solid rgba(94, 234, 212, 0.2);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .input-group {
                min-width: auto;
            }
            
            .team-grid {
                grid-template-columns: 1fr;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(30, 41, 59, 0.5);
            border-top: 3px solid #5eead4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 团队代码影响力分析器</h1>
            <p>分析团队成员代码贡献质量，识别知识孤岛，生成数据驱动的团队管理洞察</p>
        </div>

        <div class="controls">
            <div class="input-group">
                <input type="text" class="input-field" id="repoPath" placeholder="输入Git仓库路径（如：./my-project）" value="./">
                <button class="btn" onclick="analyzeRepository()">🔍 分析仓库</button>
            </div>
            <div class="input-group">
                <input type="text" class="input-field" id="branchName" placeholder="分支名称（默认：main/master）" value="main">
                <button class="btn btn-secondary" onclick="loadMockData()">📊 演示数据</button>
            </div>
            <button class="btn btn-success" onclick="generateWeekReport()">📋 生成周报</button>
            <button class="btn btn-secondary" onclick="exportData()">💾 导出数据</button>
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="card-title">📈 团队概览</div>
                <div class="metric-grid">
                    <div class="metric-item">
                        <div class="metric-label">团队规模</div>
                        <div class="metric-value" id="teamSize">8</div>
                        <div class="metric-change neutral">活跃成员</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">本周提交</div>
                        <div class="metric-value" id="weeklyCommits">156</div>
                        <div class="metric-change positive">↑ 23%</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">知识孤岛</div>
                        <div class="metric-value" id="knowledgeIslands">3</div>
                        <div class="metric-change negative">需要关注</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">代码审查率</div>
                        <div class="metric-value" id="reviewCoverage">87%</div>
                        <div class="metric-change positive">↑ 5%</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">⭐ 质量指标</div>
                <div class="metric-grid">
                    <div class="metric-item">
                        <div class="metric-label">平均Bug引入率</div>
                        <div class="metric-value" id="avgBugRate">2.3%</div>
                        <div class="metric-change positive">↓ 0.8%</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">文档覆盖率</div>
                        <div class="metric-value" id="docCoverage">76%</div>
                        <div class="metric-change neutral">持平</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">审查意见采纳率</div>
                        <div class="metric-value" id="reviewAdoption">82%</div>
                        <div class="metric-change positive">↑ 12%</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">重构贡献度</div>
                        <div class="metric-value" id="refactorScore">4.2</div>
                        <div class="metric-change positive">↑ 0.5</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">👥 团队成员分析</div>
            <div class="team-grid" id="teamGrid">
                <!-- 动态生成成员卡片 -->
            </div>
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="card-title">🕸️ 知识图谱（代码所有权）</div>
                <div class="knowledge-graph" id="knowledgeGraph">
                    <!-- 动态生成知识图谱 -->
                </div>
            </div>

            <div class="card">
                <div class="card-title">📊 贡献度趋势</div>
                <div class="chart-container" id="contributionChart">
                    <canvas id="contributionCanvas"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📋 周报生成器</div>
            <div id="weekReportContainer">
                <div style="text-align: center; padding: 40px; color: #94a3b8;">
                    点击"生成周报"按钮，自动生成数据驱动的团队周报
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 模拟团队成员数据
        const mockTeamData = {
            members: [
                {
                    id: 'zhangsan',
                    name: '张三',
                    role: '前端负责人',
                    avatar: '张',
                    stats: {
                        commits: 45,
                        linesAdded: 3200,
                        linesRemoved: 800,
                        bugsIntroduced: 2,
                        reviewComments: 56,
                        docsContributed: 8,
                        refactoring: 12
                    },
                    riskLevel: 'low',
                    modules: ['用户界面', '组件库', '路由管理'],
                    isKnowledgeIsland: false,
                    strengths: ['Vue.js', 'UI设计', '性能优化'],
                    lastActive: '2026-04-01'
                },
                {
                    id: 'lisi',
                    name: '李四',
                    role: '后端开发',
                    avatar: '李',
                    stats: {
                        commits: 32,
                        linesAdded: 2800,
                        linesRemoved: 1200,
                        bugsIntroduced: 5,
                        reviewComments: 34,
                        docsContributed: 3,
                        refactoring: 5
                    },
                    riskLevel: 'medium',
                    modules: ['支付系统', '订单管理'],
                    isKnowledgeIsland: true,
                    strengths: ['Node.js', 'MySQL', 'Redis'],
                    lastActive: '2026-04-01'
                },
                {
                    id: 'wangwu',
                    name: '王五',
                    role: '全栈开发',
                    avatar: '王',
                    stats: {
                        commits: 28,
                        linesAdded: 2400,
                        linesRemoved: 600,
                        bugsIntroduced: 1,
                        reviewComments: 42,
                        docsContributed: 12,
                        refactoring: 15
                    },
                    riskLevel: 'low',
                    modules: ['API设计', '数据模型', '权限系统'],
                    isKnowledgeIsland: false,
                    strengths: ['TypeScript', 'API设计', '测试驱动开发'],
                    lastActive: '2026-03-31'
                },
                {
                    id: 'zhaoliu',
                    name: '赵六',
                    role: 'DevOps工程师',
                    avatar: '赵',
                    stats: {
                        commits: 18,
                        linesAdded: 1200,
                        linesRemoved: 300,
                        bugsIntroduced: 1,
                        reviewComments: 28,
                        docsContributed: 15,
                        refactoring: 8
                    },
                    riskLevel: 'low',
                    modules: ['CI/CD', '部署脚本', '监控告警'],
                    isKnowledgeIsland: true,
                    strengths: ['Docker', 'K8s', '自动化部署'],
                    lastActive: '2026-03-30'
                },
                {
                    id: 'sunqi',
                    name: '孙七',
                    role: '初级开发',
                    avatar: '孙',
                    stats: {
                        commits: 15,
                        linesAdded: 800,
                        linesRemoved: 200,
                        bugsIntroduced: 8,
                        reviewComments: 12,
                        docsContributed: 2,
                        refactoring: 1
                    },
                    riskLevel: 'high',
                    modules: ['用户界面'],
                    isKnowledgeIsland: false,
                    strengths: ['React基础', 'CSS'],
                    improvement: ['测试覆盖', '代码规范', 'Bug率控制'],
                    lastActive: '2026-04-01'
                }
            ],
            modules: [
                { name: '用户界面', contributors: ['zhangsan', 'sunqi'], risk: 'medium' },
                { name: '组件库', contributors: ['zhangsan'], risk: 'high' },
                { name: '支付系统', contributors: ['lisi'], risk: 'high' },
                { name: '订单管理', contributors: ['lisi'], risk: 'high' },
                { name: 'API设计', contributors: ['wangwu'], risk: 'medium' },
                { name: 'CI/CD', contributors: ['zhaoliu'], risk: 'high' },
                { name: '权限系统', contributors: ['wangwu', 'zhangsan'], risk: 'low' },
                { name: '数据模型', contributors: ['wangwu'], risk: 'medium' }
            ]
        };

        let currentData = { ...mockTeamData };
        let chart = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadMockData();
            setTimeout(() => {
                showToast('✅ 演示数据加载完成！点击"分析仓库"可分析真实Git仓库', 5000);
            }, 1000);
        });

        // 加载演示数据
        function loadMockData() {
            currentData = JSON.parse(JSON.stringify(mockTeamData));
            renderTeamMembers();
            renderKnowledgeGraph();
            renderContributionChart();
            updateMetrics();
            showToast('📊 演示数据已加载', 3000);
        }

        // 渲染团队成员卡片
        function renderTeamMembers() {
            const teamGrid = document.getElementById('teamGrid');
            teamGrid.innerHTML = '';

            currentData.members.forEach(member => {
                const bugRate = ((member.stats.bugsIntroduced / member.stats.commits) * 100).toFixed(1);
                const contributionScore = calculateContributionScore(member);
                
                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `
                    <div class="member-header">
                        <div class="member-avatar">${member.avatar}</div>
                        <div class="member-info">
                            <h3>${member.name}</h3>
                            <p>${member.role}</p>
                        </div>
                        <div style="margin-left: auto;">
                            <span class="risk-badge risk-${member.riskLevel}">
                                ${member.riskLevel === 'low' ? '低风险' : member.riskLevel === 'medium' ? '中风险' : '高风险'}
                            </span>
                        </div>
                    </div>
                    
                    <div class="member-stats">
                        <div class="stat-item">
                            <span class="stat-value">${member.stats.commits}</span>
                            <span class="stat-label">提交数</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">${bugRate}%</span>
                            <span class="stat-label">Bug率</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">${member.stats.reviewComments}</span>
                            <span class="stat-label">审查数</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">${contributionScore.toFixed(1)}</span>
                            <span class="stat-label">贡献分</span>
                        </div>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <div style="font-size: 0.85em; color: #94a3b8; margin-bottom: 5px;">擅长领域：</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 5px;">
                            ${member.strengths.map(skill => 
                                `<span style="background: rgba(94, 234, 212, 0.1); color: #5eead4; padding: 2px 8px; border-radius: 12px; font-size: 0.75em;">${skill}</span>`
                            ).join('')}
                        </div>
                    </div>

                    <div style="font-size: 0.8em; color: #94a3b8;">
                        📂 ${member.modules.join(' • ')}
                        ${member.isKnowledgeIsland ? ' <span style="color: #f59e0b;">⚠️ 知识孤岛</span>' : ''}
                    </div>
                `;
                
                card.addEventListener('click', () => showMemberDetail(member));
                teamGrid.appendChild(card);
            });
        }

        // 计算贡献度分数
        function calculateContributionScore(member) {
            const commitScore = Math.min(member.stats.commits * 0.5, 25);
            const qualityScore = Math.max(10 - member.stats.bugsIntroduced * 2, 0);
            const reviewScore = Math.min(member.stats.reviewComments * 0.2, 20);
            const docScore = member.stats.docsContributed * 2;
            const refactorScore = member.stats.refactoring * 1.5;
            
            return commitScore + qualityScore + reviewScore + docScore + refactorScore;
        }

        // 渲染知识图谱
        function renderKnowledgeGraph() {
            const graph = document.getElementById('knowledgeGraph');
            graph.innerHTML = '<div style="text-align: center; padding: 40px; color: #94a3b8;">正在生成知识图谱...</div>';
            
            setTimeout(() => {
                graph.innerHTML = '';
                
                // 计算节点位置（环形布局）
                const centerX = graph.offsetWidth / 2;
                const centerY = graph.offsetHeight / 2;
                const radius = 120;
                
                // 渲染模块节点
                currentData.modules.forEach((module, index) => {
                    const angle = (index / currentData.modules.length) * 2 * Math.PI;
                    const x = centerX + radius * Math.cos(angle) - 60;
                    const y = centerY + radius * Math.sin(angle) - 15;
                    
                    const node = document.createElement('div');
                    node.className = 'graph-node';
                    node.style.left = x + 'px';
                    node.style.top = y + 'px';
                    node.style.background = module.risk === 'high' ? 'rgba(239, 68, 68, 0.1)' : 
                                           module.risk === 'medium' ? 'rgba(245, 158, 11, 0.1)' : 
                                           'rgba(16, 185, 129, 0.1)';
                    node.style.borderColor = module.risk === 'high' ? 'rgba(239, 68, 68, 0.5)' : 
                                           module.risk === 'medium' ? 'rgba(245, 158, 11, 0.5)' : 
                                           'rgba(16, 185, 129, 0.5)';
                    node.innerHTML = `
                        ${module.name}<br>
                        <small>${module.contributors.length}人</small>
                    `;
                    
                    node.addEventListener('click', () => {
                        showToast(`📂 ${module.name}\n👥 贡献者: ${module.contributors.join(', ')}\n⚠️ 风险等级: ${module.risk}`, 4000);
                    });
                    
                    graph.appendChild(node);
                });
                
                // 渲染中心团队节点
                const centerNode = document.createElement('div');
                centerNode.className = 'graph-node';
                centerNode.style.left = (centerX - 40) + 'px';
                centerNode.style.top = (centerY - 20) + 'px';
                centerNode.style.background = 'rgba(94, 234, 212, 0.2)';
                centerNode.innerHTML = '👥 团队';
                graph.appendChild(centerNode);
                
                // 渲染连接线
                currentData.modules.forEach((module, index) => {
                    const angle = (index / currentData.modules.length) * 2 * Math.PI;
                    const startX = centerX + radius * Math.cos(angle);
                    const startY = centerY + radius * Math.sin(angle);
                    
                    const line = document.createElement('div');
                    line.className = 'graph-line';
                    line.style.left = centerX + 'px';
                    line.style.top = centerY + 'px';
                    line.style.width = radius + 'px';
                    line.style.transform = `rotate(${angle}rad)`;
                    
                    graph.appendChild(line);
                });
            }, 500);
        }

        // 渲染贡献度趋势图
        function renderContributionChart() {
            const canvas = document.getElementById('contributionCanvas');
            const ctx = canvas.getContext('2d');
            
            // 设置canvas尺寸
            const container = canvas.parentElement;
            canvas.width = container.offsetWidth - 30;
            canvas.height = 270;
            
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 生成模拟趋势数据
            const weeks = ['第1周', '第2周', '第3周', '第4周', '第5周', '第6周', '第7周', '第8周'];
            const colors = ['#0ea5e9', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = (i / 4) * (canvas.height - 40) + 20;
                ctx.beginPath();
                ctx.moveTo(40, y);
                ctx.lineTo(canvas.width - 20, y);
                ctx.stroke();
                
                // Y轴标签
                ctx.fillStyle = '#94a3b8';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText((4 - i) * 25, 35, y + 4);
            }
            
            // 绘制成员趋势线
            currentData.members.slice(0, 5).forEach((member, memberIndex) => {
                const color = colors[memberIndex % colors.length];
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                
                const dataPoints = [];
                for (let week = 0; week < 8; week++) {
                    // 生成随机但合理的趋势数据
                    const base = member.stats.commits / 8;
                    const variation = Math.sin(week * 0.5 + memberIndex) * base * 0.3;
                    const noise = (Math.random() - 0.5) * base * 0.2;
                    const value = Math.max(0, base + variation + noise);
                    dataPoints.push(value);
                }
                
                dataPoints.forEach((value, index) => {
                    const x = (index / 7) * (canvas.width - 60) + 40;
                    const y = canvas.height - 20 - (value / 100) * (canvas.height - 40);
                    
                    if (index === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                    
                    // 绘制数据点
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, 2 * Math.PI);
                    ctx.fill();
                });
                
                ctx.stroke();
            });
            
            // 绘制X轴标签
            ctx.fillStyle = '#94a3b8';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            weeks.forEach((week, index) => {
                const x = (index / 7) * (canvas.width - 60) + 40;
                ctx.fillText(week, x, canvas.height - 5);
            });
            
            // 绘制图例
            ctx.textAlign = 'left';
            currentData.members.slice(0, 5).forEach((member, index) => {
                const color = colors[index % colors.length];
                const y = 30 + index * 20;
                
                ctx.fillStyle = color;
                ctx.fillRect(canvas.width - 150, y - 6, 12, 12);
                
                ctx.fillStyle = '#e2e8f0';
                ctx.font = '11px sans-serif';
                ctx.fillText(member.name, canvas.width - 130, y + 2);
            });
        }

        // 更新指标
        function updateMetrics() {
            const totalBugs = currentData.members.reduce((sum, m) => sum + m.stats.bugsIntroduced, 0);
            const totalCommits = currentData.members.reduce((sum, m) => sum + m.stats.commits, 0);
            const avgBugRate = ((totalBugs / totalCommits) * 100).toFixed(1);
            
            const knowledgeIslands = currentData.modules.filter(m => m.contributors.length === 1).length;
            
            document.getElementById('avgBugRate').textContent = avgBugRate + '%';
            document.getElementById('knowledgeIslands').textContent = knowledgeIslands;
        }

            }, 3000);
        }

        // 生成周报

            );

                    </div>
                    
                    <div class="report-content">
                        <h3>🎯 本周核心数据</h3>

                        <h3>⭐ 表现突出</h3>

                            <li><strong>${topContributor.name}</strong>：本周提交${topContributor.stats.commits}次，Bug率仅${((topContributor.stats.bugsIntroduced/topContributor.stats.commits)*100).toFixed(1)}%，审查意见56条，表现优异</li>
                            <li><strong>王五</strong>：文档贡献12篇，重构代码15次，技术沉淀意识强</li>

                                '<li>知识分布合理，无明显孤岛</li>'

                        <h3>💡 改进建议</h3>

                            <li>为高风险成员${highRiskMembers.length > 0 ? `（${highRiskMembers[0].name}）` : ''}安排导师指导，提升代码质量</li>

        // 导出数据
        function exportData() {
            const data = {
                timestamp: new Date().toISOString(),
                team: currentData,
                summary: {
                    totalCommits: currentData.members.reduce((sum, m) => sum + m.stats.commits, 0),
                    totalMembers: currentData.members.length,
                    knowledgeIslands: currentData.modules.filter(m => m.contributors.length === 1).length,
                    avgBugRate: ((currentData.members.reduce((sum, m) => sum + m.stats.bugsIntroduced, 0) / 
                                currentData.members.reduce((sum, m) => sum + m.stats.commits, 0)) * 100).toFixed(1) + '%'
                }
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `team-analytics-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('💾 数据已导出为JSON文件', 3000);
        }

        // 显示提示
        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.innerHTML = message.replace(/\n/g, '<br>');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                generateWeekReport();
            }
            if (e.ctrlKey && e.key === 'e') {
                e.preventDefault();
                exportData();
            }
        });
    </script>
