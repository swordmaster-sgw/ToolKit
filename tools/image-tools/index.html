<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片工具箱</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { margin-left: auto; padding: 6px 14px; background: transparent; border: 1px solid #2d3148; color: #8b90a7; border-radius: 6px; font-size: 13px; text-decoration: none; transition: all .2s; }
    .back-btn:hover { border-color: #6366f1; color: #6366f1; }
    .main { padding: 20px; max-width: 900px; margin: 0 auto; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
    .card-title { padding: 10px 16px; background: #1f2235; font-size: 12px; font-weight: 600; color: #8b90a7; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #2d3148; }
    .card-body { padding: 16px; }
    .drop-zone { border: 2px dashed #363b5e; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all .2s; }
    .drop-zone:hover { border-color: #6366f1; background: #6366f111; }
    .drop-zone p { color: #8b90a7; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #5457d4; }
    .info { padding: 12px; background: #131520; border-radius: 6px; margin-top: 12px; font-size: 12px; }
  </style>
</head>
<body>
<div class="header">
  <span style="font-size:22px">🖼️</span>
  <div>
    <h1 style="font-size:16px;font-weight:600">图片工具箱</h1>
    <p style="font-size:12px;color:#8b90a7;margin-top:2px">压缩、格式转换、Base64 编解码</p>
  </div>
  <a class="back-btn" href="../../index.html">← 返回工具集</a>
</div>

<div class="main">
  <div class="card">
    <div class="card-title">上传图片</div>
    <div class="card-body">
      <div class="drop-zone" onclick="document.getElementById('img-file').click()" id="drop-zone">
        <p style="font-size:16px;margin-bottom:8px">🖼️</p>
        <p>点击或拖拽图片到此</p>
        <p style="font-size:12px;color:#4a4f6a;margin-top:6px">支持 PNG、JPG、WebP 等格式</p>
      </div>
      <input type="file" id="img-file" style="display:none" accept="image/*" onchange="handleImage(event)">
      <div id="img-preview" style="margin-top:12px"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">处理选项</div>
    <div class="card-body" id="options" style="display:none">
      <label style="display:flex;gap:8px;margin-bottom:10px">
        <span style="min-width:80px">压缩质量:</span>
        <input type="range" id="quality" min="10" max="100" value="80" style="flex:1">
        <span id="quality-val">80%</span>
      </label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="downloadImage()">💾 下载处理后的图片</button>
      </div>
    </div>
  </div>
</div>

<script>
let imgCanvas, imgContext;
document.getElementById('quality').addEventListener('input', (e) => {
  document.getElementById('quality-val').textContent = e.target.value + '%';
});

function handleImage(e) {
  const file = e.target.files[0] || e.dataTransfer?.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (r) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      imgCanvas = canvas;
      imgContext = ctx;
      
      const preview = document.getElementById('img-preview');
      preview.innerHTML = `
        <div style="margin:12px 0">
          <img src="${r.target.result}" style="max-width:100%;max-height:200px;border-radius:6px">
          <div class="info">
            原大小: ${(file.size/1024).toFixed(1)} KB
            尺寸: ${canvas.width}×${canvas.height}px
          </div>
        </div>
      `;
      document.getElementById('options').style.display = 'block';
    };
    img.src = r.target.result;
  };
  reader.readAsDataURL(file);
}

function downloadImage() {
  if (!imgCanvas) return;
  const quality = (parseInt(document.getElementById('quality').value) / 100);
  imgCanvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `image-compressed-${Date.now()}.png`;
    a.click();
  }, 'image/png', quality);
}

// 拖拽支持
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.borderColor = '#6366f1'; });
dz.addEventListener('dragleave', () => { dz.style.borderColor = '#363b5e'; });
dz.addEventListener('drop', (e) => { e.preventDefault(); dz.style.borderColor = '#363b5e'; handleImage(e); });
</script>
</body>
</html>
