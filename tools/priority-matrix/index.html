<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>需求优先级矩阵</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { margin-left: auto; padding: 6px 14px; background: transparent; border: 1px solid #2d3148; color: #8b90a7; border-radius: 6px; font-size: 13px; text-decoration: none; transition: all .2s; }
    .back-btn:hover { border-color: #6366f1; color: #6366f1; }
    .main { padding: 20px; max-width: 1000px; margin: 0 auto; }
    .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .input-field { flex: 1; background: #131520; border: 1px solid #363b5e; border-radius: 6px; padding: 8px 12px; color: #e2e8f0; font-size: 13px; outline: none; }
    .input-field:focus { border-color: #6366f1; }
    .btn { padding: 8px 16px; background: #6366f1; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn:hover { background: #5457d4; }
    .matrix { display: grid; grid-template-columns: 150px 1fr 1fr; grid-template-rows: 30px 1fr 1fr; gap: 2px; margin-top: 20px; background: #2d3148; }
    .matrix-cell { background: #1a1d2e; border: 1px solid #2d3148; padding: 12px; display: flex; flex-direction: column; gap: 6px; min-height: 120px; position: relative; }
    .matrix-header { background: #1f2235; font-size: 12px; font-weight: 600; color: #8b90a7; display: flex; align-items: center; justify-content: center; }
    .matrix-quadrant { cursor: pointer; transition: background .2s; }
    .matrix-quadrant:hover { background: #131520; }
    .quadrant-1 { background: #ef444422; }
    .quadrant-2 { background: #f59e0b22; }
    .quadrant-3 { background: #10b98122; }
    .quadrant-4 { background: #8b5cf622; }
    .item-card { background: #131520; padding: 6px 10px; border-radius: 4px; font-size: 11px; border: 1px solid #363b5e; cursor: pointer; transition: all .2s; }
    .item-card:hover { border-color: #6366f1; background: #6366f111; }
    .item-card.urgent { border-left: 3px solid #ef4444; }
    .item-card.high { border-left: 3px solid #f59e0b; }
    .item-card.medium { border-left: 3px solid #10b981; }
    .item-card.low { border-left: 3px solid #8b5cf6; }
    .legend { display: flex; gap: 20px; margin-top: 20px; font-size: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-color { width: 20px; height: 12px; border-radius: 2px; }
  </style>
</head>
<body>
<div class="header">
  <span style="font-size:22px">🎯</span>
  <div>
    <h1 style="font-size:16px;font-weight:600">需求优先级矩阵</h1>
    <p style="font-size:12px;color:#8b90a7;margin-top:2px">四象限管理，优先级排列</p>
  </div>
  <a class="back-btn" href="../../index.html">← 返回工具集</a>
</div>

<div class="main">
  <div style="background:#1a1d2e;border:1px solid #2d3148;border-radius:10px;padding:16px;margin-bottom:16px">
    <div class="input-row">
      <input class="input-field" id="task-name" placeholder="输入需求名称..." />
      <select class="input-field" id="task-quadrant" style="width:140px">
        <option value="1">🔴 紧急重要</option>
        <option value="2">🟡 不紧急重要</option>
        <option value="3">🟢 紧急不重要</option>
        <option value="4">🟣 不紧急不重要</option>
      </select>
      <button class="btn" onclick="addTask()">+ 添加</button>
      <button class="btn" onclick="loadSample()" style="background:#2d3148;color:#c4c9e2">示例</button>
    </div>
  </div>

  <div class="matrix" id="matrix"></div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-color" style="background:#ef4444"></div>
      <span>紧急重要（立即处理）</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#f59e0b"></div>
      <span>不紧急重要（制定计划）</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#10b981"></div>
      <span>紧急不重要（委派）</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#8b5cf6"></div>
      <span>不紧急不重要（删除）</span>
    </div>
  </div>
</div>

<script>
let tasks = { 1: [], 2: [], 3: [], 4: [] };

function addTask() {
  const name = document.getElementById('task-name').value.trim();
  const quad = document.getElementById('task-quadrant').value;
  if (!name) return;
  tasks[quad].push({ name, id: Date.now() });
  document.getElementById('task-name').value = '';
  render();
}

function deleteTask(quad, id) {
  tasks[quad] = tasks[quad].filter(t => t.id !== id);
  render();
}

function loadSample() {
  tasks = {
    1: [
      { name: '紧急缺陷修复', id: 1 },
      { name: '生产环境故障', id: 2 },
    ],
    2: [
      { name: '架构优化', id: 3 },
      { name: '性能提升计划', id: 4 },
    ],
    3: [
      { name: '邮件回复', id: 5 },
      { name: '会议记录', id: 6 },
    ],
    4: [
      { name: '八卦聊天', id: 7 },
      { name: '娱乐视频', id: 8 },
    ],
  };
  render();
}

function render() {
  const headers = ['', '重要', '不重要'];
  const labels = ['紧急', '不紧急'];
  const quads = [1, 2, 3, 4];
  const colors = { 1: 'urgent', 2: 'high', 3: 'medium', 4: 'low' };
  const quadLabels = { 1: '🔴 紧急重要', 2: '🟡 不紧急重要', 3: '🟢 紧急不重要', 4: '🟣 不紧急不重要' };

  let html = headers.map((h, i) => `<div class="matrix-header">${h}</div>`).join('');
  html += `<div class="matrix-header">🔽</div>`;
  html += headers[1] ? `<div class="matrix-header"></div>` : '';
  html += headers[2] ? `<div class="matrix-header"></div>` : '';

  for (let i = 0; i < 2; i++) {
    html += `<div class="matrix-header">🔶 ${labels[i]}</div>`;
    for (let j = 0; j < 2; j++) {
      const quad = i * 2 + j + 1;
      const items = tasks[quad];
      html += `<div class="matrix-cell matrix-quadrant quadrant-${quad}">
        <div style="font-size:11px;font-weight:600;color:#8b90a7">${quadLabels[quad]}</div>
        ${items.map(t => `<div class="item-card ${colors[quad]}" onclick="deleteTask(${quad}, ${t.id})" title="点击删除">${t.name}</div>`).join('')}
      </div>`;
    }
  }

  document.getElementById('matrix').innerHTML = html;
}

render();
</script>
</body>
</html>
