  // 只在非编辑模式下监听输入区变化
  if (!isEditMode) {
    const v=document.getElementById('input').value;
    setInSize(v.length);
    clearTimeout(autoTimer);
    autoTimer=setTimeout(()=>{ if(v.trim()) formatJSON(); else { parsedData=null; setOutputEmpty(); clearNodeView(); }},400);
  }
}
document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey){
    if(e.key==='Enter'){ e.preventDefault(); formatJSON(); }
    if(e.shiftKey&&e.key==='M'){ e.preventDefault(); minifyJSON(); }
  }
  
  // 编辑模式快捷键
  if (isEditMode && e.ctrlKey) {
    if (e.key === 's') {
      e.preventDefault();
      toggleEditMode(); // Ctrl+S 保存并退出编辑模式
    }
    if (e.key === 'f') {
      e.preventDefault();
      filterJSON(); // Ctrl+F 筛选
    }
  }
});
const textarea=document.getElementById('input');
['dragenter','dragover'].forEach(ev=>{ textarea.addEventListener(ev,e=>{ e.preventDefault(); textarea.classList.add('drag-over'); }); });
['dragleave','drop'].forEach(ev=>{ textarea.addEventListener(ev,e=>{ textarea.classList.remove('drag-over'); }); });
textarea.addEventListener('drop',e=>{
  e.preventDefault();
  const file=e.dataTransfer.files[0]; if(!file)return;
  if(file.size>5*1024*1024){ setStatus('文件过大（最大 5MB）','error'); return; }
  const reader=new FileReader();
  reader.onload=ev=>{ textarea.value=ev.target.result; onInputChange(); setStatus(`已加载文件: ${file.name}`,'success'); };
  reader.onerror=()=>setStatus('文件读取失败','error');
  reader.readAsText(file,'utf-8');
});

/* ===================================================================
   ██████  节点图视图  ██████
=================================================================== */
const COL_GAP = 60;   // 列间距
const ROW_GAP = 10;   // 同列节点间距
const COL_START_X = 20;
const COL_START_Y = 20;
const CARD_WIDTH = 220;

let nodeViewScale = 1;
let nodeViewOffsetX = 0;
let nodeViewOffsetY = 0;
let isDragging = false;
let dragStartX = 0, dragStartY = 0;

// nodeId -> { cardEl, dotX, dotY (绝对坐标), rows: [{key, value, childNodeId}] }
let nodeMap = {}; // id -> node info
let nodeIdCounter = 0;
let collapsedNodes = new Set(); // 折叠的节点 id

function clearNodeView() {
  const canvas = document.getElementById('node-canvas');
  // 保留 SVG
  const svgEl = document.getElementById('edge-svg');
  canvas.innerHTML = '';
  canvas.appendChild(svgEl);
  svgEl.innerHTML = '';
  nodeMap = {};
  nodeIdCounter = 0;
  collapsedNodes.clear();
  document.getElementById('node-empty-hint').style.display = 'flex';
}

/* ── 主入口：渲染节点视图 ── */
function renderNodeView(data) {
  document.getElementById('node-empty-hint').style.display = 'none';
  clearNodeView();

  // 构建节点树
  const tree = buildTree(null, data, 0);

  // 按列布局
  const cols = []; // cols[depth] = [nodeId, ...]
  flattenTree(tree, 0, cols);

  // 放置节点
  layoutNodes(cols);

  // 绘制连线
  drawEdges();
}

/* ── 构建树结构 ── */
// 返回 nodeId
function buildTree(key, value, depth) {
  const id = nodeIdCounter++;
  const isObj = value !== null && typeof value === 'object' && !Array.isArray(value);
  const isArr = Array.isArray(value);

  const rows = [];

  if (isObj) {
    Object.entries(value).forEach(([k, v]) => {
      const hasChildren = v !== null && typeof v === 'object';
      let childId = null;
      if (hasChildren) childId = buildTree(k, v, depth + 1);
      rows.push({ key: k, value: v, childId, hasChildren });
    });
  } else if (isArr) {
    value.forEach((v, i) => {
      const hasChildren = v !== null && typeof v === 'object';
      let childId = null;
      if (hasChildren) childId = buildTree(String(i), v, depth + 1);
      rows.push({ key: String(i), value: v, childId, hasChildren });
    });
  }

  nodeMap[id] = { id, key, value, depth, rows, cardEl: null, dotConnectors: {} };
  return id;
}

/* ── 按列归纳所有节点（BFS，只收集可见节点） ── */
function flattenTree(nodeId, depth, cols) {
  if (!cols[depth]) cols[depth] = [];
  cols[depth].push(nodeId);

  if (collapsedNodes.has(nodeId)) return; // 折叠则不展开子节点

  const node = nodeMap[nodeId];
  node.rows.forEach(row => {
    if (row.childId !== null) flattenTree(row.childId, depth + 1, cols);
  });
}

/* ── 布局节点 ── */
function layoutNodes(cols) {
  const canvas = document.getElementById('node-canvas');

  // 先计算每列宽度（统一 CARD_WIDTH）
  let x = COL_START_X;
  cols.forEach((colNodes, colIdx) => {
    let y = COL_START_Y;
    colNodes.forEach(nodeId => {
      const node = nodeMap[nodeId];
      const card = createNodeCard(node);
      card.style.left = x + 'px';
      card.style.top = y + 'px';
      canvas.appendChild(card);
      node.cardEl = card;
      node.x = x;
      node.y = y;
      node.w = CARD_WIDTH;
      node.h = card.offsetHeight || estimateCardHeight(node);
      y += node.h + ROW_GAP;
    });
    x += CARD_WIDTH + COL_GAP;
  });

  // 更新 SVG 尺寸
  const totalW = x;
  const totalH = Math.max(...Object.values(nodeMap).filter(n=>n.cardEl).map(n=>n.y+n.h)) + 40;
  const svg = document.getElementById('edge-svg');
  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  canvas.style.width = totalW + 'px';
  canvas.style.height = totalH + 'px';
}

function estimateCardHeight(node) {
  return 28 + node.rows.length * 28;
}

/* ── 创建节点卡片 DOM ── */
function createNodeCard(node) {
  const card = document.createElement('div');
  card.className = 'node-card' + (node.depth === 0 ? ' node-root' : '');
  card.style.position = 'absolute';
  card.style.width = CARD_WIDTH + 'px';

  const isArr = Array.isArray(node.value);
  const isCollapsed = collapsedNodes.has(node.id);

  node.rows.forEach((row, rowIdx) => {
    const rowEl = document.createElement('div');
    rowEl.className = 'node-row' + (row.hasChildren ? ' has-children' : '');
    rowEl.dataset.nodeId = node.id;
    rowEl.dataset.rowIdx = rowIdx;

    const keyEl = document.createElement('span');
    keyEl.className = 'nk';
    keyEl.textContent = isArr ? `[${row.key}]` : row.key;
    rowEl.appendChild(keyEl);

    if (row.hasChildren) {
      // 显示类型标记 + 折叠图标
      const badge = document.createElement('span');
      badge.className = 'node-type-badge';
      const childNode = nodeMap[row.childId];
      const childIsArr = Array.isArray(childNode.value);
      const childLen = childIsArr ? childNode.value.length : Object.keys(childNode.value).length;
      badge.textContent = childIsArr ? `[${childLen}]` : `{${childLen}}`;
      rowEl.appendChild(badge);

      const colIcon = document.createElement('span');
      colIcon.className = 'collapse-icon';
      colIcon.textContent = isCollapsed ? '▶' : '—';
      rowEl.appendChild(colIcon);

      // 连接点
      const dot = document.createElement('div');
      dot.className = 'node-dot';
      rowEl.appendChild(dot);

      rowEl.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleCollapse(row.childId);
      });

      node.dotConnectors[rowIdx] = dot;
    } else {
      // 叶子值
      const valEl = document.createElement('span');
      valEl.className = 'nv ' + getValueClass(row.value);
      valEl.textContent = formatLeafValue(row.value);
      rowEl.appendChild(valEl);
    }

    card.appendChild(rowEl);
  });

  // 若是折叠状态在底部显示 ...
  if (isCollapsed) {
    const colHint = document.createElement('div');
    colHint.style.cssText = 'padding:4px 10px;font-size:10px;color:#4a4f6a;text-align:center;cursor:pointer;';
    colHint.textContent = '···';
    card.appendChild(colHint);
  }

  return card;
}

function getValueClass(v) {
  if (v === null) return 'null';
  if (typeof v === 'boolean') return 'bool';
  if (typeof v === 'number') return 'num';
  if (typeof v === 'string') return 'str';
  if (Array.isArray(v)) return 'ref-arr';
  return 'ref-obj';
}

function formatLeafValue(v) {
  if (v === null) return 'null';
  if (typeof v === 'string') {
    const s = v.length > 20 ? v.slice(0, 20) + '…' : v;
    return s;
  }
  return String(v);
}

/* ── 折叠/展开 ── */
function toggleCollapse(nodeId) {
  if (collapsedNodes.has(nodeId)) collapsedNodes.delete(nodeId);
  else collapsedNodes.add(nodeId);
  renderNodeView(parsedData);
}

function expandAll() { collapsedNodes.clear(); if (parsedData) renderNodeView(parsedData); }
function collapseAll() {
  // 折叠所有非根节点
  Object.keys(nodeMap).forEach(id => { if (parseInt(id) !== 0) collapsedNodes.add(parseInt(id)); });
  if (parsedData) { collapsedNodes.clear(); /* rebuild map */ renderNodeView(parsedData); }
  // 折叠所有 depth>0
  // 先 render 获取 nodeMap，再折叠
  clearNodeView();
  buildTree(null, parsedData, 0);
  Object.values(nodeMap).forEach(n => { if (n.depth > 0) collapsedNodes.add(n.id); });
  renderNodeView(parsedData);
}

/* ── 绘制连线 ── */
function drawEdges() {
  const svg = document.getElementById('edge-svg');
  svg.innerHTML = '';

  Object.values(nodeMap).forEach(node => {
    if (!node.cardEl) return;
    node.rows.forEach((row, rowIdx) => {
      if (!row.hasChildren || !row.childId) return;
      if (collapsedNodes.has(row.childId)) return; // 折叠了不画线

      const dot = node.dotConnectors[rowIdx];
      if (!dot) return;
      const childNode = nodeMap[row.childId];
      if (!childNode || !childNode.cardEl) return;

      // 计算连接点坐标
      const dotRect = dot.getBoundingClientRect();
      const canvasRect = document.getElementById('node-canvas').getBoundingClientRect();
      const wrapRect = document.getElementById('node-view-wrapper').getBoundingClientRect();

      // 用节点布局坐标计算（不依赖 getBoundingClientRect，避免缩放干扰）
      const rowH = 28;
      const cardPaddingTop = 0;
      const srcX = node.x + node.w;
      const srcY = node.y + cardPaddingTop + rowIdx * rowH + rowH / 2;

      const dstX = childNode.x;
      const dstY = childNode.y + childNode.h / 2;

      drawBezier(svg, srcX, srcY, dstX, dstY);
    });
  });
}

function drawBezier(svg, x1, y1, x2, y2) {
  const cp1x = x1 + (x2 - x1) * 0.5;
  const cp1y = y1;
  const cp2x = x2 - (x2 - x1) * 0.5;
  const cp2y = y2;
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', `M${x1},${y1} C${cp1x},${cp1y} ${cp2x},${cp2y} ${x2},${y2}`);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', '#3a3f6a');
  path.setAttribute('stroke-width', '1.5');
  path.setAttribute('stroke-linecap', 'round');
  svg.appendChild(path);

  // 终点小圆圈（入射点）
  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', x2);
  circle.setAttribute('cy', y2);
  circle.setAttribute('r', '3.5');
  circle.setAttribute('fill', '#3a3f6a');
  circle.setAttribute('stroke', '#6366f1');
  circle.setAttribute('stroke-width', '1');
  svg.appendChild(circle);
}

/* ── 搜索 ── */
function nodeSearch(query) {
  const q = query.trim().toLowerCase();
  document.querySelectorAll('.node-row').forEach(row => {
    row.classList.remove('search-match');
    row.querySelector('.nk') && row.querySelector('.nk').classList.remove('search-match-key');
  });
  if (!q) return;
  document.querySelectorAll('.node-row').forEach(row => {
    const keyEl = row.querySelector('.nk');
    if (keyEl && keyEl.textContent.toLowerCase().includes(q)) {
      row.classList.add('search-match');
      keyEl.classList.add('search-match-key');
    }
  });
}

/* ===================================================================
   节点视图：缩放 & 平移
=================================================================== */
function applyTransform() {
  const canvas = document.getElementById('node-canvas');
  canvas.style.transform = `translate(${nodeViewOffsetX}px,${nodeViewOffsetY}px) scale(${nodeViewScale})`;
}

function zoomIn()  { nodeViewScale = Math.min(nodeViewScale * 1.2, 4); applyTransform(); }
function zoomOut() { nodeViewScale = Math.max(nodeViewScale / 1.2, 0.2); applyTransform(); }
function resetZoom() { nodeViewScale = 1; nodeViewOffsetX = 0; nodeViewOffsetY = 0; applyTransform(); }

function fitView() {
  const wrapper = document.getElementById('node-view-wrapper');
  const canvas = document.getElementById('node-canvas');
  const cw = wrapper.clientWidth, ch = wrapper.clientHeight;
  const nw = parseFloat(canvas.style.width) || 800;
  const nh = parseFloat(canvas.style.height) || 600;
  const scale = Math.min(cw / (nw + 40), ch / (nh + 40), 1.5);
  nodeViewScale = scale;
  nodeViewOffsetX = (cw - nw * scale) / 2;
  nodeViewOffsetY = (ch - nh * scale) / 2;
  applyTransform();
}

// 拖拽画布
const wrapper = document.getElementById('node-view-wrapper');
wrapper.addEventListener('mousedown', e => {
  if (e.target.closest('.node-card') || e.target.closest('.zoom-controls') || e.target.closest('.fit-btn') || e.target.closest('.node-toolbar')) return;
  isDragging = true;
  dragStartX = e.clientX - nodeViewOffsetX;
  dragStartY = e.clientY - nodeViewOffsetY;
  wrapper.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  nodeViewOffsetX = e.clientX - dragStartX;
  nodeViewOffsetY = e.clientY - dragStartY;
  applyTransform();
});
window.addEventListener('mouseup', () => { isDragging=false; wrapper.style.cursor='grab'; });

// 滚轮缩放
wrapper.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const rect = wrapper.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // 以鼠标为中心缩放
  nodeViewOffsetX = mx - (mx - nodeViewOffsetX) * factor;
  nodeViewOffsetY = my - (my - nodeViewOffsetY) * factor;
  nodeViewScale = Math.min(Math.max(nodeViewScale * factor, 0.15), 5);
  applyTransform();
}, { passive: false });

// 触控支持
let lastTouchDist = null;
wrapper.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  } else if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX - nodeViewOffsetX;
    dragStartY = e.touches[0].clientY - nodeViewOffsetY;
  }
}, {passive:true});
wrapper.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && lastTouchDist !== null) {
    const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    nodeViewScale = Math.min(Math.max(nodeViewScale * dist/lastTouchDist, 0.15), 5);
    lastTouchDist = dist;
    applyTransform();
  } else if (e.touches.length === 1 && isDragging) {
    nodeViewOffsetX = e.touches[0].clientX - dragStartX;
    nodeViewOffsetY = e.touches[0].clientY - dragStartY;
    applyTransform();
  }
}, {passive:true});
wrapper.addEventListener('touchend', () => { isDragging=false; lastTouchDist=null; });

/* ===================================================================
   初始化
=================================================================== */
setOutputEmpty();
</script>
