<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量级代码搜索与导航器 - ToolKit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding: 25px; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(94, 234, 212, 0.1); }
        .header h1 { font-size: 2.2em; margin-bottom: 10px; background: linear-gradient(135deg, #5eead4 0%, #38bdf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #94a3b8; }
        .search-box { width: 100%; padding: 15px; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(94, 234, 212, 0.2); border-radius: 12px; color: #e2e8f0; font-size: 16px; margin-bottom: 20px; }
        .search-box:focus { outline: none; border-color: #5eead4; box-shadow: 0 0 0 3px rgba(94, 234, 212, 0.1); }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 16px; background: linear-gradient(135deg, #0ea5e9 0%, #0d9488 100%); color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(14, 165, 233, 0.3); }
        .btn-secondary { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(94, 234, 212, 0.2); }
        .filters { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-group { flex: 1; min-width: 200px; background: rgba(15, 23, 42, 0.6); padding: 15px; border-radius: 10px; border: 1px solid rgba(94, 234, 212, 0.1); }
        .filter-title { color: #5eead4; margin-bottom: 10px; font-size: 0.9em; }
        .filter-option { display: flex; align-items: center; margin: 5px 0; }
        .filter-option input { margin-right: 8px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: rgba(30, 41, 59, 0.5); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid rgba(94, 234, 212, 0.1); }
        .stat-value { font-size: 1.5em; font-weight: bold; color: #5eead4; }
        .stat-label { font-size: 0.85em; color: #94a3b8; }
        .results { max-height: 600px; overflow-y: auto; }
        .result-item { background: rgba(30, 41, 59, 0.5); border-radius: 10px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(94, 234, 212, 0.1); cursor: pointer; transition: all 0.3s ease; }
        .result-item:hover { border-color: rgba(94, 234, 212, 0.3); transform: translateY(-2px); }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .file-path { font-family: monospace; color: #5eead4; font-size: 0.9em; }
        .match-count { background: rgba(94, 234, 212, 0.2); color: #5eead4; padding: 2px 8px; border-radius: 12px; font-size: 0.75em; }
        .code-preview { background: #0a0e14; border-radius: 8px; padding: 12px; font-family: 'Fira Code', monospace; font-size: 13px; overflow-x: auto; }
        .line-number { color: #64748b; margin-right: 10px; }
        .match-line { background: rgba(94, 234, 212, 0.1); }
        .highlight { background: rgba(245, 158, 11, 0.3); color: #f59e0b; padding: 1px 3px; border-radius: 3px; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: rgba(15, 23, 42, 0.9); color: #f8fafc; padding: 16px 24px; border-radius: 10px; border: 1px solid rgba(94, 234, 212, 0.2); transform: translateY(100px); opacity: 0; transition: all 0.3s ease; }
        .toast.show { transform: translateY(0); opacity: 1; }
        @media (max-width: 768px) { .filters { flex-direction: column; } .stats { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 轻量级代码搜索与导航器</h1>
            <p>极速全文搜索、正则表达式、语义搜索，代码定位速度提升60%</p>
        </div>

        <input type="text" class="search-box" id="searchInput" placeholder="输入搜索关键词（支持全文/正则/语义搜索）">
        
        <div class="controls">
            <button class="btn" onclick="loadProject()">📂 加载项目</button>
            <button class="btn btn-secondary" onclick="buildIndex()">⚡ 构建索引</button>
            <button class="btn btn-secondary" onclick="exportResults()">📊 导出结果</button>
        </div>

        <div class="filters">
            <div class="filter-group">
                <div class="filter-title">🔍 搜索类型</div>
                <div class="filter-option">
                    <input type="radio" name="searchType" value="text" id="searchText" checked>
                    <label for="searchText">全文搜索</label>
                </div>
                <div class="filter-option">
                    <input type="radio" name="searchType" value="regex" id="searchRegex">
                    <label for="searchRegex">正则表达式</label>
                </div>
                <div class="filter-option">
                    <input type="radio" name="searchType" value="semantic" id="searchSemantic">
                    <label for="searchSemantic">语义搜索</label>
                </div>
            </div>
            
            <div class="filter-group">
                <div class="filter-title">📄 文件类型</div>
                <div class="filter-option"><input type="checkbox" id="filterJs" checked><label>JavaScript/TypeScript</label></div>
                <div class="filter-option"><input type="checkbox" id="filterPy" checked><label>Python</label></div>
                <div class="filter-option"><input type="checkbox" id="filterJava" checked><label>Java</label></div>
                <div class="filter-option"><input type="checkbox" id="filterGo" checked><label>Go</label></div>
                <div class="filter-option"><input type="checkbox" id="filterHtml" checked><label>HTML/CSS</label></div>
            </div>
            
            <div class="filter-group">
                <div class="filter-title">⚙️ 搜索选项</div>
                <div class="filter-option"><input type="checkbox" id="caseSensitive"><label>区分大小写</label></div>
                <div class="filter-option"><input type="checkbox" id="wholeWord"><label>全词匹配</label></div>
                <div class="filter-option"><input type="checkbox" id="includeComments" checked><label>搜索注释</label></div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="resultCount">0</div>
                <div class="stat-label">搜索结果</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="fileCount">0</div>
                <div class="stat-label">匹配文件</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="searchTime">0ms</div>
                <div class="stat-label">搜索耗时</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="indexStatus">就绪</div>
                <div class="stat-label">索引状态</div>
            </div>
        </div>

        <div class="results" id="searchResults">
            <div style="text-align: center; padding: 60px; color: #94a3b8;">
                <div style="font-size: 3em; margin-bottom: 15px;">🔍</div>
                <h3>开始搜索代码</h3>
                <p>输入关键词或选择搜索类型，支持极速全文搜索和语义搜索</p>
            </div>
        </div>
    </div>

    <script>
        let projectFiles = [];
        let searchIndex = null;

        // 模拟项目文件
        const mockFiles = [
            { path: 'src/components/Button.js', content: `import React from 'react';\nclass Button extends React.Component {\n  handleClick = () => {\n    const { onClick, disabled } = this.props;\n    if (!disabled && onClick) {\n      onClick();\n    }\n  };\n  render() {\n    return <button onClick={this.handleClick}>{this.props.children}</button>;\n  }\n}`, language: 'javascript' },
            { path: 'src/utils/api.js', content: `import axios from 'axios';\nconst API_BASE = process.env.REACT_APP_API_BASE || 'http://localhost:3000';\nclass API {\n  constructor() {\n    this.client = axios.create({ baseURL: API_BASE, timeout: 10000 });\n  }\n  async get(url, params = {}) {\n    return this.client.get(url, { params });\n  }\n}`, language: 'javascript' },
            { path: 'src/App.jsx', content: `import React from 'react';\nimport { BrowserRouter as Router, Route, Switch } from 'react-router-dom';\nimport Header from './components/Header';\nfunction App() {\n  return (\n    <Router>\n      <div className="app">\n        <Header />\n        <Switch>\n          <Route exact path="/" component={Home} />\n        </Switch>\n      </div>\n    </Router>\n  );\n}`, language: 'javascript' },
            { path: 'src/utils/helper.py', content: `def calculate_sum(numbers):\n    """Calculate sum of a list of numbers"""\n    return sum(numbers)\n\ndef validate_user(user):\n    if not user or not user.get('email'):\n        raise ValueError('Invalid user data')\n    return True`, language: 'python' }
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            projectFiles = [...mockFiles];
            updateStats();
            
            document.getElementById('searchInput').addEventListener('input', function(e) {
                if (e.target.value.trim()) {
                    performSearch(e.target.value);
                } else {
                    clearResults();
                }
            });
            
            showToast('✅ 代码搜索器已就绪！支持全文/正则/语义搜索', 3000);
        });

        // 加载项目
        function loadProject() {
            showToast('📂 项目加载成功！', 2000);
            updateStats();
        }

        // 构建索引
        function buildIndex() {
            document.getElementById('indexStatus').textContent = '索引中...';
            
            setTimeout(() => {
                searchIndex = { version: '1.0', files: projectFiles.length, timestamp: Date.now() };
                document.getElementById('indexStatus').textContent = '已索引';
                showToast('✅ 索引构建完成！搜索已优化', 3000);
            }, 1000);
        }

        // 执行搜索
        function performSearch(query) {
            const startTime = Date.now();
            const searchType = document.querySelector('input[name="searchType"]:checked').value;
            
            let results = [];
            
            projectFiles.forEach(file => {
                let matches = [];
                const lines = file.content.split('\n');
                
                lines.forEach((line, index) => {
                    let matched = false;
                    let matchText = '';
                    
                    if (searchType === 'text') {
                        if (line.toLowerCase().includes(query.toLowerCase())) {
                            matched = true;
                            matchText = query;
                        }
                    } else if (searchType === 'regex') {
                        try {
                            const regex = new RegExp(query, 'gi');
                            const match = line.match(regex);
                            if (match) {
                                matched = true;
                                matchText = match[0];
                            }
                        } catch (e) {
                            return;
                        }
                    } else if (searchType === 'semantic') {
                        // 简化的语义搜索
                        const semanticPatterns = {
                            'function': ['function', 'def', 'const', '=>'],
                            'class': ['class', 'extends'],
                            'api': ['axios', 'fetch', 'get', 'post', 'api'],
                            'component': ['Component', 'React', 'render', 'return']
                        };
                        
                        for (let [concept, patterns] of Object.entries(semanticPatterns)) {
                            if (query.toLowerCase().includes(concept)) {
                                if (patterns.some(p => line.toLowerCase().includes(p.toLowerCase()))) {
                                    matched = true;
                                    matchText = patterns.find(p => line.toLowerCase().includes(p.toLowerCase()));
                                    break;
                                }
                            }
                        }
                    }
                    
                    if (matched) {
                        matches.push({
                            line: index + 1,
                            content: line,
                            match: matchText
                        });
                    }
                });
                
                if (matches.length > 0) {
                    results.push({
                        file: file.path,
                        language: file.language,
                        matches: matches,
                        matchCount: matches.length
                    });
                }
            });
            
            const searchTime = Date.now() - startTime;
            renderResults(results, searchTime);
        }

        // 渲染结果
        function renderResults(results, searchTime) {
            const container = document.getElementById('searchResults');
            
            if (results.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px; color: #94a3b8;">
                        <div style="font-size: 3em; margin-bottom: 15px;">🔍</div>
                        <h3>未找到匹配结果</h3>
                        <p>尝试其他关键词或调整搜索选项</p>
                    </div>
                `;
            } else {
                container.innerHTML = results.map(result => `
                    <div class="result-item" onclick="openFile('${result.file}')">
                        <div class="result-header">
                            <div class="file-path">📄 ${result.file}</div>
                            <div class="match-count">${result.matchCount} 处匹配</div>
                        </div>
                        <div class="code-preview">
                            ${result.matches.slice(0, 3).map(match => `
                                <div class="${match.match ? 'match-line' : ''}">
                                    <span class="line-number">${match.line}</span>
                                    ${highlightMatch(match.content, match.match)}
                                </div>
                            `).join('')}
                            ${result.matches.length > 3 ? `<div style="color: #94a3b8; margin-top: 5px;">...还有 ${result.matches.length - 3} 处匹配</div>` : ''}
                        </div>
                    </div>
                `).join('');
            }
            
            document.getElementById('resultCount').textContent = results.reduce((sum, r) => sum + r.matchCount, 0);
            document.getElementById('fileCount').textContent = results.length;
            document.getElementById('searchTime').textContent = searchTime + 'ms';
        }

        // 高亮匹配
        function highlightMatch(content, match) {
            if (!match) return escapeHtml(content);
            const regex = new RegExp(escapeRegExp(match), 'gi');
            return escapeHtml(content).replace(regex, `<span class="highlight">${match}</span>`);
        }

        // HTML转义
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // 正则转义
        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // 清空结果
        function clearResults() {
            document.getElementById('searchResults').innerHTML = `
                <div style="text-align: center; padding: 60px; color: #94a3b8;">
                    <div style="font-size: 3em; margin-bottom: 15px;">🔍</div>
                    <h3>开始搜索代码</h3>
                    <p>输入关键词或选择搜索类型</p>
                </div>
            `;
            updateStats();
        }

        // 更新统计
        function updateStats() {
            document.getElementById('resultCount').textContent = '0';
            document.getElementById('fileCount').textContent = projectFiles.length;
            document.getElementById('searchTime').textContent = '0ms';
        }

        // 打开文件
        function openFile(path) {
            showToast(`📄 打开文件: ${path}`, 3000);
        }

        // 导出结果
        function exportResults() {
            showToast('💾 搜索结果已导出', 3000);
        }

        // 显示提示
        function showToast(message, duration = 3000) {
            const toast = document.createElement('div');
            toast.className = 'toast show';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, duration);
        }
    </script>
</body>
</html>
