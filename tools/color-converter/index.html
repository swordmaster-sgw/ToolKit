    * { box-sizing: border-box; margin: 0; padding: 0; }

    .back-btn { margin-left: auto; padding: 6px 14px; background: transparent; border: 1px solid var(--border-default); color: var(--text-muted); border-radius: 6px; font-size: 13px; text-decoration: none; transition: all .2s; }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .main { padding: 20px; max-width: 960px; margin: 0 auto; }
    .card { background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
    .card-title { padding: 10px 16px; background: var(--bg-elevated); font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border-default); display: flex; align-items: center; gap: 8px; }
    .card-body { padding: 16px; }
    .btn { padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; transition: all .2s; display: inline-flex; align-items: center; gap: 4px; }
    .btn:hover { transform: translateY(-1px); }
    .btn-default { background: var(--border-default); color: var(--text-secondary); }
    .btn-default:hover { background: var(--accent); color: #fff; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: var(--accent-light); }
    .btn-sm { padding: 3px 10px; font-size: 11px; }

    /* Color picker area */
    .picker-grid { display: grid; grid-template-columns: 1fr 180px; gap: 16px; }
    .color-preview { width: 100%; height: 100%; min-height: 140px; border-radius: 8px; border: 1px solid var(--border-subtle); transition: background .2s; cursor: pointer; }
    .input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
    .color-picker-input { width: 48px; height: 38px; border: none; border-radius: 6px; cursor: pointer; padding: 0; background: none; }
    .text-input { flex: 1; background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: 6px; padding: 9px 12px; color: var(--text-primary); font-family: 'SF Mono', monospace; font-size: 14px; outline: none; transition: border-color .2s; }
    .text-input:focus { border-color: var(--accent); }
    .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .slider-label { min-width: 28px; font-size: 12px; color: var(--text-muted); font-weight: 600; }

    .slider-val { min-width: 36px; font-size: 12px; color: var(--text-primary); text-align: right; font-family: monospace; }

    .format-item { background: var(--bg-base); border-radius: 8px; padding: 10px 12px; border: 1px solid var(--border-subtle); }

// ============== Color Utilities ==============
function hexToRgb(hex) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  return { r: parseInt(hex.slice(0,2),16), g: parseInt(hex.slice(2,4),16), b: parseInt(hex.slice(4,6),16) };
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2, '0')).join('');
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      default: h = ((r - g) / d + 4) / 6;
    }
  }
  return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
}

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
  };
  return { r: Math.round(f(0) * 255), g: Math.round(f(8) * 255), b: Math.round(f(4) * 255) };
}

function getLuminance(r, g, b) {
  const [rs, gs, bs] = [r, g, b].map(v => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
}

function colorDist(a, b) {
  return Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2);
}

function contrastRatio(fg, bg) {
  const l1 = getLuminance(fg.r, fg.g, fg.b);
  const l2 = getLuminance(bg.r, bg.g, bg.b);
  return (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
}

// ============== Toast ==============
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2000);
}

// ============== Clipboard ==============
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('✓ 已复制: ' + text)).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ 已复制');
  });
}

function findBestTailwind(r, g, b) {
  let bestColor = 'gray', bestShade = 500, bestDist = Infinity;
  const target = [r, g, b];

  for (const [colorName, shades] of Object.entries(TW_COLORS)) {
    for (const [shade, rgb] of Object.entries(shades)) {
      const d = colorDist(target, rgb);
      if (d < bestDist) {
        bestDist = d;
        bestColor = colorName;
        bestShade = parseInt(shade);
      }
    }
  }

  // Find top 3 color families
  const familyScores = {};
  for (const [colorName, shades] of Object.entries(TW_COLORS)) {
    let minD = Infinity, bestS = 500;
    for (const [shade, rgb] of Object.entries(shades)) {
      const d = colorDist(target, rgb);
      if (d < minD) { minD = d; bestS = parseInt(shade); }
    }
    if (colorName === 'gray' || colorName === 'slate' || colorName === 'zinc' || colorName === 'neutral' || colorName === 'stone') continue;
    familyScores[colorName] = { shade: bestS, dist: minD };
  }
  const sortedFamilies = Object.entries(familyScores).sort((a, b) => a[1].dist - b[1].dist).slice(0, 5);

  return { color: bestColor, shade: bestShade, dist: bestDist, alternatives: sortedFamilies };
}

function textColorFor(r, g, b) {
  return getLuminance(r, g, b) > 0.35 ? '#000' : '#fff';
}

function renderTailwindScale(r, g, b) {
  const match = findBestTailwind(r, g, b);
  const shades = TW_COLORS[match.color];

  // Best match info
  const matchHex = rgbToHex(...shades[match.shade]);
  document.getElementById('tw-match-info').innerHTML = `
    <span class="color-dot" style="background:${matchHex}"></span>
    最近匹配: <span class="tw-class-name">${match.color}-${match.shade}</span>
    <span style="color:var(--text-muted)">${matchHex}</span>
    <span style="color:var(--text-muted);font-size:10px">(距离: ${match.dist.toFixed(1)})</span>
  `;

  // Render main scale
  document.getElementById('tw-scale').innerHTML = Object.entries(shades).map(([shade, rgb]) => {
    const hex = rgbToHex(...rgb);
    const active = parseInt(shade) === match.shade && match.dist < 100 ? ' active' : '';
    const tc = textColorFor(...rgb);
    return `<div class="tw-swatch${active}" style="background:${hex}" onclick="setColor('${hex}')" title="${match.color}-${shade} ${hex}">
      <span style="color:${tc}">${shade}</span>
    </div>`;
  }).join('');

  // Render alternatives
  document.getElementById('tw-alternatives').innerHTML = match.alternatives.map(([name, info]) => {
    const rgb = TW_COLORS[name][info.shade];
    const hex = rgbToHex(...rgb);
    return `<div class="tw-scale" style="margin-bottom:8px">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">${name} (距离: ${info.dist.toFixed(1)})</div>
      ${Object.entries(TW_COLORS[name]).map(([shade, rgb]) => {
        const h = rgbToHex(...rgb);
        const tc = textColorFor(...rgb);
        const active = parseInt(shade) === info.shade ? ' active' : '';
        return `<div class="tw-swatch${active}" style="background:${h};height:32px" onclick="setColor('${h}')" title="${name}-${shade} ${h}">
          <span style="color:${tc};font-size:8px">${shade}</span>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

  { label: '&#x2192;', value: 'to right' },
  { label: '&#x2193;', value: 'to bottom' },
  { label: '&#x2199;', value: 'to bottom right' },
  { label: '&#x2196;', value: 'to bottom left' },
  { label: '&#x2B05;', value: 'to left' },
  { label: '&#x2B06;', value: 'to top' },
  { label: '&#x2197;', value: 'to top right' },
  { label: '&#x2198;', value: 'to top left' },
];

const GRADIENT_PRESETS = [
  ['#667eea', '#764ba2'], ['#f093fb', '#f5576c'], ['#4facfe', '#00f2fe'],
  ['#43e97b', '#38f9d7'], ['#fa709a', '#fee140'], ['#a18cd1', '#fbc2eb'],
  ['#fccb90', '#d57eeb'], ['#e0c3fc', '#8ec5fc'], ['#f5576c', '#ff6a00'],
  ['#0acffe', '#495aff'], ['#667eea', '#764ba2'], ['#89f7fe', '#66a6ff'],
  ['#fddb92', '#d1fdff'], ['#a1c4fd', '#c2e9fb'], ['#d4fc79', '#96e6a1'],
  ['#84fab0', '#8fd3f4'], ['#cfd9df', '#e2ebf0'], ['#ffecd2', '#fcb69f'],
];

let gradDir = 'to right';

function updateGradient() {
  const from = document.getElementById('grad-from').value;
  const to = document.getElementById('grad-to').value;
  const useMid = document.getElementById('grad-use-mid').checked;
  const mid = document.getElementById('grad-mid').value;
  const stops = useMid ? `${from}, ${mid}, ${to}` : `${from}, ${to}`;
  const css = `linear-gradient(${gradDir}, ${stops})`;
  document.getElementById('gradient-preview').style.background = css;
  document.getElementById('gradient-code').textContent = `background: ${css};`;
}

function renderGradientUI() {
  // Direction buttons
  document.getElementById('dir-row').innerHTML = GRADIENT_DIRS.map(d =>
    `<button class="dir-btn${d.value === gradDir ? ' active' : ''}" onclick="setGradDir('${d.value}')" title="${d.value}">${d.label}</button>`
  ).join('');

  // Presets
  document.getElementById('gradient-presets').innerHTML = GRADIENT_PRESETS.map(([c1, c2]) =>
    `<div class="gradient-preset" style="background:linear-gradient(135deg,${c1},${c2})" onclick="applyPreset('${c1}','${c2}')"></div>`
  ).join('');

  updateGradient();
}

function setGradDir(dir) {
  gradDir = dir;
  renderGradientUI();
}

function applyPreset(c1, c2) {
  document.getElementById('grad-from').value = c1;
  document.getElementById('grad-to').value = c2;
  document.getElementById('grad-use-mid').checked = false;
  updateGradient();
}

function copyGradientCode() {
  copyText(document.getElementById('gradient-code').textContent);
}

// ============== Main Update ==============
function updateAll(r, g, b, a) {
  a = a !== undefined ? a : 255;
  r = Math.round(r); g = Math.round(g); b = Math.round(b);

  // Sliders
  document.getElementById('sr').value = r; document.getElementById('rv').textContent = r;
  document.getElementById('sg').value = g; document.getElementById('gv').textContent = g;
  document.getElementById('sb').value = b; document.getElementById('bv').textContent = b;
  document.getElementById('sa').value = a; document.getElementById('av').textContent = (a / 255).toFixed(2);

  const hex = rgbToHex(r, g, b);
  document.getElementById('hex-input').value = hex;
  document.getElementById('picker').value = hex;

  const hsl = rgbToHsl(r, g, b);
  document.getElementById('hsl-input').value = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;

  const alpha = (a / 255).toFixed(2);
  const preview = a < 255 ? `rgba(${r},${g},${b},${alpha})` : hex;
  document.getElementById('preview').style.background = preview;

  // Formats
  const formats = [
    ['HEX', hex.toUpperCase()],
    ['RGB', `rgb(${r}, ${g}, ${b})`],
    ['RGBA', `rgba(${r}, ${g}, ${b}, ${alpha})`],
    ['HSL', `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`],
    ['HSLA', `hsla(${hsl.h}, ${hsl.s}%, ${hsl.l}%, ${alpha})`],
    ['CSS', `--color: ${hex};`],
  ];

  const tw = findBestTailwind(r, g, b);
  if (tw.dist < 100) {
    formats.push(['Tailwind', `${tw.color}-${tw.shade}`]);
  }

  document.getElementById('formats').innerHTML = formats.map(([label, val]) => `
    <div class="format-item">
      <div class="format-label">${label}</div>
      <div class="format-val">${val}</div>
      <button class="copy-btn" onclick="copyText('${val.replace(/'/g, "\\'")}')">复制</button>
    </div>
  `).join('');

  // Tailwind scale
  renderTailwindScale(r, g, b);

  // Contrast
  updateContrast();
}

function updateContrast() {
  const fgHex = document.getElementById('fg').value;
  const bgHex = document.getElementById('bg').value;
  const fg = hexToRgb(fgHex), bg = hexToRgb(bgHex);
  const ratio = contrastRatio(fg, bg);

  document.getElementById('contrast-preview').style.background = bgHex;
  document.getElementById('contrast-preview').style.color = fgHex;
  document.getElementById('contrast-ratio').textContent = ratio.toFixed(2) + ':1';
  document.getElementById('contrast-badges').innerHTML = `
    <span class="badge ${ratio >= 3 ? 'badge-pass' : 'badge-fail'}">${ratio >= 3 ? '✓' : '✗'} AA 大字 (3:1)</span>
    <span class="badge ${ratio >= 4.5 ? 'badge-pass' : 'badge-fail'}">${ratio >= 4.5 ? '✓' : '✗'} AA (4.5:1)</span>
    <span class="badge ${ratio >= 7 ? 'badge-pass' : 'badge-fail'}">${ratio >= 7 ? '✓' : '✗'} AAA (7:1)</span>
  `;
}

function setColor(hex) {
  const { r, g, b } = hexToRgb(hex);
  updateAll(r, g, b);
}

// ============== Event Bindings ==============
document.getElementById('picker').addEventListener('input', function() { setColor(this.value); });

document.getElementById('hex-input').addEventListener('input', function() {
  let val = this.value.trim();
  // Check named color
  const named = NAMED_COLORS[val.toLowerCase()];
  if (named) { setColor(named); return; }
  let hex = val;
  if (!hex.startsWith('#')) hex = '#' + hex;
  if (/^#[0-9a-fA-F]{3}$/.test(hex) || /^#[0-9a-fA-F]{6}$/.test(hex) || /^#[0-9a-fA-F]{8}$/.test(hex)) {
    setColor(hex.slice(0, 7)); // Only use first 6 hex chars for RGB
  }
});

document.getElementById('hsl-input').addEventListener('input', function() {
  const m = this.value.match(/hsl[a]?\(\s*(\d+)\s*,\s*(\d+)%?\s*,\s*(\d+)%?/);
  if (m) {
    const { r, g, b } = hslToRgb(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]));
    updateAll(r, g, b);
  }
});

['sr', 'sg', 'sb', 'sa'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    const r = +document.getElementById('sr').value;
    const g = +document.getElementById('sg').value;
    const b = +document.getElementById('sb').value;
    const a = +document.getElementById('sa').value;
    updateAll(r, g, b, a);
  });
});

document.getElementById('fg').addEventListener('input', updateContrast);
document.getElementById('bg').addEventListener('input', updateContrast);
document.getElementById('grad-from').addEventListener('input', updateGradient);
document.getElementById('grad-to').addEventListener('input', updateGradient);
document.getElementById('grad-mid').addEventListener('input', updateGradient);
document.getElementById('grad-use-mid').addEventListener('change', updateGradient);

// ============== Palette ==============
let customPalette = JSON.parse(localStorage.getItem('color-palette') || '[]');
const DEFAULT_PALETTE = [
  '#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#22c55e','#10b981','#14b8a6',
  '#06b6d4','#0ea5e9','#3b82f6','#6366f1','#8b5cf6','#a855f7','#d946ef','#ec4899',
  '#f43f5e','#ffffff','#e2e8f0','#94a3b8','#475569','#1e293b','#0f172a','#000000'
];

function renderPalette() {
  const all = [...DEFAULT_PALETTE, ...customPalette];
  document.getElementById('palette').innerHTML = all.map((c, i) => {
    const isCustom = i >= DEFAULT_PALETTE.length;
    return `<div class="swatch" style="background:${c};${c === '#ffffff' ? 'border-color:var(--border-subtle)' : ''}" onclick="setColor('${c}')" title="${c}${isCustom ? ' (双击删除)' : ''}" ${isCustom ? 'ondblclick="removeFromPalette(' + i + ')"' : ''}></div>`;
  }).join('');
}

function addColorToPalette() {
  const hex = document.getElementById('hex-input').value;
  if (!hex || !hex.startsWith('#')) return;
  if (!customPalette.includes(hex)) {
    customPalette.push(hex);
    localStorage.setItem('color-palette', JSON.stringify(customPalette));
    renderPalette();
    showToast('✓ 已添加 ' + hex + ' 到色板');
  }
}

function removeFromPalette(index) {
  const customIndex = index - DEFAULT_PALETTE.length;
  if (customIndex >= 0 && customIndex < customPalette.length) {
    customPalette.splice(customIndex, 1);
    localStorage.setItem('color-palette', JSON.stringify(customPalette));
    renderPalette();
    showToast('已从色板移除');
  }
}

function exportPalette(format) {
  const all = [...DEFAULT_PALETTE, ...customPalette];
  let output = '';
  if (format === 'css') {
    output = ':root {\n' + all.map((c, i) => `  --color-${i + 1}: ${c};`).join('\n') + '\n}';
  } else if (format === 'scss') {
    output = all.map((c, i) => `$color-${i + 1}: ${c};`).join('\n');
  } else if (format === 'tailwind') {
    output = 'colors: {\n' + all.map((c, i) => `  'custom-${i + 1}': '${c}',`).join('\n') + '\n}';
  }
  copyText(output);
}

renderPalette();

document.addEventListener('keydown', (e) => {
  const isCtrl = e.ctrlKey || e.metaKey;
  if (isCtrl && e.key === 'c' && !window.getSelection().toString()) {
    const hex = document.getElementById('hex-input').value;
    if (hex) { e.preventDefault(); copyText(hex); }
  }
});
