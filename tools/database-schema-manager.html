<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库Schema版本管理器 - ToolKit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding: 25px; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(94, 234, 212, 0.1); }
        .header h1 { font-size: 2.2em; margin-bottom: 10px; background: linear-gradient(135deg, #5eead4 0%, #38bdf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #94a3b8; }
        .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .sidebar { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(94, 234, 212, 0.1); padding: 20px; }
        .sidebar h3 { color: #5eead4; margin-bottom: 15px; }
        .connection-form { display: flex; flex-direction: column; gap: 12px; }
        .form-input { padding: 10px; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(94, 234, 212, 0.2); border-radius: 8px; color: #e2e8f0; }
        .btn { padding: 10px 16px; background: linear-gradient(135deg, #0ea5e9 0%, #0d9488 100%); color: white; border: none; border-radius: 8px; cursor: pointer; margin: 5px 0; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(14, 165, 233, 0.3); }
        .btn-secondary { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(94, 234, 212, 0.2); }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .schema-list { max-height: 300px; overflow-y: auto; margin: 15px 0; }
        .schema-item { background: rgba(30, 41, 59, 0.5); padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid rgba(94, 234, 212, 0.1); cursor: pointer; transition: all 0.3s ease; }
        .schema-item:hover { border-color: rgba(94, 234, 212, 0.3); }
        .schema-item.active { border-color: #5eead4; background: rgba(94, 234, 212, 0.1); }
        .main-content { background: rgba(15, 23, 42, 0.6); border-radius: 15px; border: 1px solid rgba(94, 234, 212, 0.1); padding: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(94, 234, 212, 0.1); }
        .tab { padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.3s ease; }
        .tab.active { border-bottom-color: #5eead4; color: #5eead4; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .table-card { background: rgba(30, 41, 59, 0.5); border-radius: 10px; padding: 15px; border: 1px solid rgba(94, 234, 212, 0.1); }
        .table-name { color: #5eead4; font-weight: bold; margin-bottom: 10px; }
        .field-list { font-size: 0.85em; }
        .field-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(94, 234, 212, 0.1); }
        .migration-item { background: rgba(30, 41, 59, 0.5); padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid rgba(94, 234, 212, 0.1); }
        .migration-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .migration-status { padding: 2px 8px; border-radius: 12px; font-size: 0.75em; }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-applied { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .comparison-side { background: rgba(30, 41, 59, 0.5); border-radius: 10px; padding: 15px; }
        .diff-added { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .diff-removed { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: rgba(15, 23, 42, 0.9); color: #f8fafc; padding: 16px 24px; border-radius: 10px; border: 1px solid rgba(94, 234, 212, 0.2); transform: translateY(100px); opacity: 0; transition: all 0.3s ease; }
        .toast.show { transform: translateY(0); opacity: 1; }
        @media (max-width: 768px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗄️ 数据库Schema版本管理器</h1>
            <p>数据库Schema快照、迁移脚本生成、版本控制，支持MySQL/PostgreSQL/SQLite</p>
        </div>

        <div class="main-layout">
            <div class="sidebar">
                <h3>🔗 数据库连接</h3>
                <div class="connection-form">
                    <select class="form-input" id="dbType">
                        <option value="mysql">MySQL</option>
                        <option value="postgresql">PostgreSQL</option>
                        <option value="sqlite">SQLite</option>
                    </select>
                    <input type="text" class="form-input" id="dbHost" placeholder="主机 (localhost)" value="localhost">
                    <input type="text" class="form-input" id="dbPort" placeholder="端口 (3306)" value="3306">
                    <input type="text" class="form-input" id="dbName" placeholder="数据库名" value="myapp">
                    <input type="text" class="form-input" id="dbUser" placeholder="用户名" value="root">
                    <input type="password" class="form-input" id="dbPassword" placeholder="密码">
                    <button class="btn" onclick="connectDatabase()">🔗 连接</button>
                    <button class="btn btn-secondary" onclick="loadDemo()">📊 演示数据</button>
                </div>

                <h3>📸 Schema快照</h3>
                <button class="btn" onclick="createSnapshot()">📷 创建快照</button>
                <div class="schema-list" id="snapshotList">
                    <div class="schema-item active" onclick="loadSnapshot('current')">
                        <div><strong>当前版本</strong></div>
                        <div style="font-size: 0.8em; color: #94a3b8;">最新状态</div>
                    </div>
                </div>

                <h3>📈 统计</h3>
                <div style="font-size: 0.9em; color: #94a3b8;">
                    <div style="margin-bottom: 8px;">表数量: <span id="tableCount" style="color: #5eead4;">0</span></div>
                    <div style="margin-bottom: 8px;">迁移数: <span id="migrationCount" style="color: #5eead4;">0</span></div>
                    <div>最后快照: <span id="lastSnapshot" style="color: #5eead4;">-</span></div>
                </div>
            </div>

            <div class="main-content">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('tables')">📋 数据表</div>
                    <div class="tab" onclick="switchTab('migrations')">🔄 迁移脚本</div>
                    <div class="tab" onclick="switchTab('comparison')">📊 版本对比</div>
                    <div class="tab" onclick="switchTab('history')">📜 历史记录</div>
                </div>

                <div class="tab-content active" id="tablesTab">
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <button class="btn" onclick="generateMigration()">📝 生成迁移</button>
                        <button class="btn btn-secondary" onclick="exportSchema()">📤 导出Schema</button>
                        <button class="btn btn-secondary" onclick="importSchema()">📥 导入Schema</button>
                    </div>
                    <div class="table-grid" id="tablesGrid">
                        <!-- 动态生成表列表 -->
                    </div>
                </div>

                <div class="tab-content" id="migrationsTab">
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <button class="btn" onclick="createMigration()">➕ 新建迁移</button>
                        <button class="btn btn-success" onclick="applyMigration()">✅ 应用迁移</button>
                        <button class="btn btn-secondary" onclick="rollbackMigration()">⏮️ 回滚</button>
                    </div>
                    <div id="migrationsList">
                        <!-- 动态生成迁移列表 -->
                    </div>
                </div>

                <div class="tab-content" id="comparisonTab">
                    <div style="margin-bottom: 15px;">
                        <select id="compareVersion1" style="margin-right: 10px;">
                            <option value="current">当前版本</option>
                        </select>
                        <select id="compareVersion2">
                            <option value="previous">上一个版本</option>
                        </select>
                        <button class="btn" onclick="compareVersions()" style="margin-left: 10px;">🔍 对比</button>
                    </div>
                    <div id="comparisonResult">
                        <div style="text-align: center; padding: 40px; color: #94a3b8;">
                            选择版本并点击对比
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="historyTab">
                    <div id="historyList">
                        <!-- 动态生成历史记录 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let snapshots = [];
        let migrations = [];
        let currentTables = [];
        let connectionStatus = false;

        // 模拟表结构
        const demoTables = [
            {
                name: 'users',
                fields: [
                    { name: 'id', type: 'INT', primary: true, autoIncrement: true },
                    { name: 'email', type: 'VARCHAR(255)', unique: true },
                    { name: 'password', type: 'VARCHAR(255)' },
                    { name: 'created_at', type: 'TIMESTAMP', default: 'CURRENT_TIMESTAMP' }
                ]
            },
            {
                name: 'posts',
                fields: [
                    { name: 'id', type: 'INT', primary: true, autoIncrement: true },
                    { name: 'user_id', type: 'INT', foreignKey: 'users.id' },
                    { name: 'title', type: 'VARCHAR(255)' },
                    { name: 'content', type: 'TEXT' },
                    { name: 'status', type: 'ENUM("draft","published")', default: 'draft' }
                ]
            },
            {
                name: 'comments',
                fields: [
                    { name: 'id', type: 'INT', primary: true, autoIncrement: true },
                    { name: 'post_id', type: 'INT', foreignKey: 'posts.id' },
                    { name: 'user_id', type: 'INT', foreignKey: 'users.id' },
                    { name: 'content', type: 'TEXT' }
                ]
            }
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadDemo();
            renderTables();
            renderMigrations();
            updateStats();
            showToast('✅ 数据库Schema管理器已就绪', 3000);
        });

        // 加载演示数据
        function loadDemo() {
            currentTables = JSON.parse(JSON.stringify(demoTables));
            connectionStatus = true;
            
            // 创建初始快照
            snapshots = [{
                id: 'snapshot-1',
                name: '初始版本',
                timestamp: Date.now() - 86400000,
                tables: JSON.parse(JSON.stringify(currentTables))
            }];
            
            // 添加一些迁移
            migrations = [
                {
                    id: 'migration-1',
                    name: '创建用户表',
                    timestamp: Date.now() - 86400000,
                    status: 'applied',
                    sql: 'CREATE TABLE users (id INT PRIMARY KEY AUTO_INCREMENT, email VARCHAR(255) UNIQUE, password VARCHAR(255), created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP);'
                },
                {
                    id: 'migration-2',
                    name: '创建文章表',
                    timestamp: Date.now() - 43200000,
                    status: 'applied',
                    sql: 'CREATE TABLE posts (id INT PRIMARY KEY AUTO_INCREMENT, user_id INT, title VARCHAR(255), content TEXT, status ENUM("draft","published") DEFAULT "draft", FOREIGN KEY (user_id) REFERENCES users(id));'
                },
                {
                    id: 'migration-3',
                    name: '添加评论表',
                    timestamp: Date.now(),
                    status: 'pending',
                    sql: 'CREATE TABLE comments (id INT PRIMARY KEY AUTO_INCREMENT, post_id INT, user_id INT, content TEXT, FOREIGN KEY (post_id) REFERENCES posts(id), FOREIGN KEY (user_id) REFERENCES users(id));'
                }
            ];
            
            showToast('📊 演示数据已加载', 2000);
        }

        // 连接数据库（模拟）
        function connectDatabase() {
            const dbType = document.getElementById('dbType').value;
            const host = document.getElementById('dbHost').value;
            const port = document.getElementById('dbPort').value;
            const dbName = document.getElementById('dbName').value;
            
            showToast(`🔗 正在连接 ${dbType}://${host}:${port}/${dbName}...`, 3000);
            
            setTimeout(() => {
                connectionStatus = true;
                showToast('✅ 数据库连接成功', 3000);
            }, 1500);
        }

        // 渲染数据表
        function renderTables() {
            const grid = document.getElementById('tablesGrid');
            grid.innerHTML = currentTables.map(table => `
                <div class="table-card">
                    <div class="table-name">📋 ${table.name}</div>
                    <div class="field-list">
                        ${table.fields.map(field => `
                            <div class="field-item">
                                <span>${field.primary ? '🔑 ' : ''}${field.name}</span>
                                <span style="color: #94a3b8;">${field.type}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div style="margin-top: 10px; display: flex; gap: 5px;">
                        <button class="btn btn-secondary" style="font-size: 0.8em; padding: 5px 10px;" onclick="editTable('${table.name}')">编辑</button>
                        <button class="btn btn-danger" style="font-size: 0.8em; padding: 5px 10px;" onclick="dropTable('${table.name}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 渲染迁移列表
        function renderMigrations() {
            const list = document.getElementById('migrationsList');
            list.innerHTML = migrations.map(migration => `
                <div class="migration-item">
                    <div class="migration-header">
                        <div>
                            <strong>${migration.name}</strong>
                            <div style="font-size: 0.8em; color: #94a3b8;">${new Date(migration.timestamp).toLocaleString('zh-CN')}</div>
                        </div>
                        <div>
                            <span class="migration-status status-${migration.status}">${migration.status === 'applied' ? '已应用' : '待应用'}</span>
                        </div>
                    </div>
                    <div class="code-preview" style="font-size: 0.8em;">${migration.sql}</div>
                </div>
            `).join('');
        }

        // 创建快照
        function createSnapshot() {
            const snapshot = {
                id: 'snapshot-' + Date.now(),
                name: '快照 ' + new Date().toLocaleString('zh-CN'),
                timestamp: Date.now(),
                tables: JSON.parse(JSON.stringify(currentTables))
            };
            
            snapshots.push(snapshot);
            renderSnapshots();
            updateStats();
            showToast('📸 Schema快照已创建', 3000);
        }

        // 渲染快照列表
        function renderSnapshots() {
            const list = document.getElementById('snapshotList');
            const currentHtml = list.querySelector('.schema-item').outerHTML;
            
            list.innerHTML = currentHtml + snapshots.map(snapshot => `
                <div class="schema-item" onclick="loadSnapshot('${snapshot.id}')">
                    <div><strong>${snapshot.name}</strong></div>
                    <div style="font-size: 0.8em; color: #94a3b8;">${new Date(snapshot.timestamp).toLocaleString('zh-CN')}</div>
                </div>
            `).join('');
        }

        // 加载快照
        function loadSnapshot(id) {
            if (id === 'current') {
                renderTables();
                showToast('📋 已切换到当前版本', 2000);
                return;
            }
            
            const snapshot = snapshots.find(s => s.id === id);
            if (snapshot) {
                // 这里应该显示版本对比
                showToast(`📸 加载快照: ${snapshot.name}`, 3000);
            }
        }

        // 生成迁移
        function generateMigration() {
            const migration = {
                id: 'migration-' + Date.now(),
                name: '迁移_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '_'),
                timestamp: Date.now(),
                status: 'pending',
                sql: `-- 自动生成迁移脚本\n${currentTables.map(table => `\n-- Table: ${table.name}\nCREATE TABLE ${table.name} (\n  ${table.fields.map(field => `  ${field.name} ${field.type}${field.primary ? ' PRIMARY KEY' : ''}${field.autoIncrement ? ' AUTO_INCREMENT' : ''}${field.unique ? ' UNIQUE' : ''}${field.default ? ` DEFAULT ${field.default}` : ''}`).join(',\n')}\n);`).join('\n\n')}`
            };
            
            migrations.push(migration);
            renderMigrations();
            updateStats();
            showToast('📝 迁移脚本已生成', 3000);
        }

        // 应用迁移
        function applyMigration() {
            const pending = migrations.filter(m => m.status === 'pending');
            if (pending.length === 0) {
                showToast('✅ 没有待应用的迁移', 3000);
                return;
            }
            
            pending.forEach(migration => {
                migration.status = 'applied';
                showToast(`✅ 已应用: ${migration.name}`, 2000);
            });
            
            renderMigrations();
            updateStats();
        }

        // 切换标签
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        // 对比版本
        function compareVersions() {
            const result = document.getElementById('comparisonResult');
            result.innerHTML = `
                <div class="comparison-grid">
                    <div class="comparison-side">
                        <h3 style="color: #5eead4; margin-bottom: 15px;">当前版本</h3>
                        <div class="table-grid">
                            ${currentTables.slice(0, 2).map(table => `
                                <div class="table-card">
                                    <div class="table-name">📋 ${table.name}</div>
                                    <div class="field-list">
                                        ${table.fields.map(field => `<div class="field-item"><span>${field.name}</span><span style="color: #94a3b8;">${field.type}</span></div>`).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="comparison-side">
                        <h3 style="color: #5eead4; margin-bottom: 15px;">上一个版本</h3>
                        <div class="table-grid">
                            ${currentTables.slice(0, 2).map(table => `
                                <div class="table-card">
                                    <div class="table-name">📋 ${table.name}</div>
                                    <div class="field-list">
                                        ${table.fields.slice(0, 3).map(field => `<div class="field-item"><span>${field.name}</span><span style="color: #94a3b8;">${field.type}</span></div>`).join('')}
                                        <div class="field-item diff-added" style="border-radius: 4px; padding: 4px; margin-top: 5px;">
                                            <span>+ new_field</span><span>VARCHAR(100)</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                <div style="margin-top: 20px; padding: 15px; background: rgba(30, 41, 59, 0.5); border-radius: 8px;">
                    <div style="color: #10b981;">➕ 新增: 2 个字段</div>
                    <div style="color: #f59e0b;">⚠️ 修改: 1 个表结构</div>
                </div>
            `;
            
            showToast('🔍 版本对比完成', 2000);
        }

        // 更新统计
        function updateStats() {
            document.getElementById('tableCount').textContent = currentTables.length;
            document.getElementById('migrationCount').textContent = migrations.length;
            document.getElementById('lastSnapshot').textContent = snapshots.length > 0 ? '刚刚' : '-';
        }

        // 显示提示
        function showToast(message, duration = 3000) {
            const toast = document.createElement('div');
            toast.className = 'toast show';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, duration);
        }

        // 占位函数
        function editTable(name) { showToast(`✏️ 编辑表: ${name}`, 2000); }
        function dropTable(name) { showToast(`🗑️ 删除表: ${name}`, 2000); }
        function createMigration() { showToast('➕ 创建新迁移', 2000); }
        function rollbackMigration() { showToast('⏮️ 回滚迁移', 2000); }
        function exportSchema() { showToast('📤 Schema已导出', 2000); }
        function importSchema() { showToast('📥 Schema已导入', 2000); }
    </script>
</body>
</html>
