<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>周报智能助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { margin-left: auto; padding: 6px 14px; background: transparent; border: 1px solid #2d3148; color: #8b90a7; border-radius: 6px; font-size: 13px; text-decoration: none; transition: all .2s; }
    .back-btn:hover { border-color: #6366f1; color: #6366f1; }
    .main { padding: 20px; max-width: 1100px; margin: 0 auto; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 10px; overflow: hidden; }
    .card-title { padding: 10px 16px; background: #1f2235; font-size: 12px; font-weight: 600; color: #8b90a7; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #2d3148; }
    .card-body { padding: 16px; }
    textarea { width: 100%; background: #131520; color: #e2e8f0; border: 1px solid #363b5e; border-radius: 6px; padding: 12px; font-family: 'Cascadia Code', monospace; font-size: 13px; resize: vertical; outline: none; min-height: 150px; transition: border-color .2s; }
    textarea:focus { border-color: #6366f1; }
    .btn-row { padding: 12px 16px; display: flex; gap: 8px; background: #1a1d2e; border-top: 1px solid #2d3148; }
    .btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #5457d4; }
    .btn-secondary { background: #2d3148; color: #c4c9e2; }
    .btn-secondary:hover { background: #363b5e; }
    .copy-btn { padding: 3px 10px; background: #2d3148; border: none; border-radius: 4px; color: #8b90a7; cursor: pointer; font-size: 11px; }
    .copy-btn:hover { background: #6366f1; color: #fff; }
    @media (max-width: 768px) { .grid2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="header">
  <span style="font-size:22px">✍️</span>
  <div>
    <h1 style="font-size:16px;font-weight:600">周报智能助手</h1>
    <p style="font-size:12px;color:#8b90a7;margin-top:2px">结构化输入本周工作，智能生成标准周报</p>
  </div>
  <a class="back-btn" href="../../index.html">← 返回工具集</a>
</div>

<div class="main">
  <div class="grid2">
    <div class="card">
      <div class="card-title">周报信息输入</div>
      <div class="card-body">
        <textarea id="completed" placeholder="本周完成事项：&#10;- 完成 API 接口文档编写&#10;- 修复关键性能问题&#10;- 完成代码审查 10+ 次&#10;- 参与架构评审会议"></textarea>
        <div style="margin:12px 0"></div>
        <textarea id="planned" placeholder="下周计划：&#10;- 开始新模块开发&#10;- 性能优化工作&#10;- 技术分享准备"></textarea>
        <div style="margin:12px 0"></div>
        <textarea id="blocked" placeholder="阻塞/问题：&#10;无 / 或描述遇到的困难"></textarea>
        <div class="btn-row" style="border-top:none;padding:0">
          <button class="btn btn-primary" onclick="generate()">📝 生成周报</button>
          <button class="btn btn-secondary" onclick="loadSample()">📋 示例</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        周报稿
        <button class="copy-btn" onclick="copyReport()">复制</button>
      </div>
      <textarea id="report" readonly placeholder="生成的周报将显示在此..."></textarea>
      <div class="btn-row" style="border-top:none;padding:12px 16px">
        <button class="btn btn-secondary" onclick="exportMarkdown()">📥 导出 Markdown</button>
      </div>
    </div>
  </div>
</div>

<script>
function generate() {
  const completed = document.getElementById('completed').value.trim();
  const planned = document.getElementById('planned').value.trim();
  const blocked = document.getElementById('blocked').value.trim() || '无';

  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);

  const report = `# 工作周报

**周期**: ${weekStart.toLocaleDateString('zh-CN')} ~ ${weekEnd.toLocaleDateString('zh-CN')}  
**报告人**: ______  
**报告时间**: ${now.toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'})}

## 📈 本周完成

${completed.split('\n').filter(l => l.trim()).join('\n') || '- 无'}

## 📋 下周计划

${planned.split('\n').filter(l => l.trim()).join('\n') || '- 待定'}

## 🚧 遇到的问题与阻塞

${blocked}

## 💬 备注

- 团队氛围良好，同事协作度高
- 技术栈迭代顺利
- 建议加强知识分享

---

**签名**: ______`;

  document.getElementById('report').value = report;
}

function loadSample() {
  document.getElementById('completed').value = `- 完成工具集导航页面开发
- 实现 15 个开发工具（JSON格式化、正则测试、Base64等）
- 完成数据处理工具开发（CSV转JSON、Diff对比）
- 编写项目技术文档和使用指南
- Code Review 团队代码 8 次，提出改进建议 12 条`;
  
  document.getElementById('planned').value = `- 继续完成剩余工具开发（总目标 30+）
- 前端性能优化和响应式适配
- 用户体验改进和反馈处理
- 技术方案分享（工具系统架构）`;
  
  document.getElementById('blocked').value = `无严重阻塞，进度正常推进`;
  
  generate();
}

function copyReport() {
  const v = document.getElementById('report').value;
  navigator.clipboard.writeText(v).then(() => {
    const btn = event.target;
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = '复制', 1200);
  });
}

function exportMarkdown() {
  const v = document.getElementById('report').value;
  const blob = new Blob([v], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `周报_${new Date().toISOString().slice(0,10)}.md`;
  a.click();
}
</script>
</body>
</html>
