<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cron 表达式助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { margin-left: auto; padding: 6px 14px; background: transparent; border: 1px solid #2d3148; color: #8b90a7; border-radius: 6px; font-size: 13px; text-decoration: none; transition: all .2s; }
    .back-btn:hover { border-color: #6366f1; color: #6366f1; }
    .main { padding: 20px; max-width: 900px; margin: 0 auto; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
    .card-title { padding: 10px 16px; background: #1f2235; font-size: 12px; font-weight: 600; color: #8b90a7; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #2d3148; }
    .card-body { padding: 16px; }
    .cron-input { width: 100%; background: #131520; border: 2px solid #363b5e; border-radius: 8px; padding: 14px 16px; color: #6366f1; font-family: monospace; font-size: 20px; font-weight: 700; letter-spacing: 3px; outline: none; transition: border-color .2s; }
    .cron-input:focus { border-color: #6366f1; }
    .fields-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 16px; }
    .field-item { text-align: center; }
    .field-label { font-size: 11px; color: #8b90a7; margin-bottom: 4px; font-weight: 600; }
    .field-input { width: 100%; background: #131520; border: 1px solid #363b5e; border-radius: 6px; padding: 8px; color: #e2e8f0; font-family: monospace; font-size: 14px; text-align: center; outline: none; transition: border-color .2s; }
    .field-input:focus { border-color: #6366f1; }
    .desc { font-size: 11px; color: #4a4f6a; margin-top: 3px; }
    .presets { display: flex; flex-wrap: wrap; gap: 8px; }
    .preset-btn { padding: 6px 14px; background: #2d3148; border: none; border-radius: 6px; color: #c4c9e2; font-size: 12px; cursor: pointer; transition: all .2s; }
    .preset-btn:hover { background: #6366f1; color: #fff; }
    .next-runs { list-style: none; }
    .run-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #2d314866; font-size: 13px; }
    .run-item:last-child { border-bottom: none; }
    .run-idx { color: #6366f1; font-weight: 700; min-width: 20px; }
    .run-time { font-family: monospace; color: #a5d6ff; }
    .run-rel { color: #8b90a7; font-size: 12px; }
    .human-desc { padding: 10px 14px; background: #131520; border-radius: 8px; font-size: 14px; color: #22c55e; border-left: 3px solid #22c55e; }
    .error { color: #ef4444; font-size: 13px; }
    .btn { padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; margin-top: 12px; }
    .btn-secondary { background: #2d3148; color: #c4c9e2; }
    .btn-secondary:hover { background: #6366f1; color: #fff; }
    @media (max-width: 600px) { .fields-grid { grid-template-columns: repeat(3, 1fr); } }
  </style>
</head>
<body>
<div class="header">
  <span style="font-size:22px">⏰</span>
  <div>
    <h1 style="font-size:16px;font-weight:600">Cron 表达式助手</h1>
    <p style="font-size:12px;color:#8b90a7;margin-top:2px">可视化生成/解析 Cron，预览下次执行时间</p>
  </div>
  <a class="back-btn" href="../../index.html">← 返回工具集</a>
</div>

<div class="main">
  <div class="card">
    <div class="card-title">Cron 表达式</div>
    <div class="card-body">
      <input class="cron-input" id="cron-input" value="0 9 * * 1-5" oninput="onCronChange()" placeholder="* * * * *">
      <div class="fields-grid">
        <div class="field-item">
          <div class="field-label">分钟</div>
          <input class="field-input" id="f-min" oninput="buildCron()">
          <div class="desc">0–59</div>
        </div>
        <div class="field-item">
          <div class="field-label">小时</div>
          <input class="field-input" id="f-hour" oninput="buildCron()">
          <div class="desc">0–23</div>
        </div>
        <div class="field-item">
          <div class="field-label">日</div>
          <input class="field-input" id="f-day" oninput="buildCron()">
          <div class="desc">1–31</div>
        </div>
        <div class="field-item">
          <div class="field-label">月</div>
          <input class="field-input" id="f-month" oninput="buildCron()">
          <div class="desc">1–12</div>
        </div>
        <div class="field-item">
          <div class="field-label">星期</div>
          <input class="field-input" id="f-week" oninput="buildCron()">
          <div class="desc">0–7 (0=周日)</div>
        </div>
      </div>
      <button class="btn btn-secondary" onclick="navigator.clipboard.writeText(document.getElementById('cron-input').value)">📋 复制表达式</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">常用预设</div>
    <div class="card-body">
      <div class="presets">
        <button class="preset-btn" onclick="setCron('* * * * *')">每分钟</button>
        <button class="preset-btn" onclick="setCron('0 * * * *')">每小时整点</button>
        <button class="preset-btn" onclick="setCron('0 9 * * *')">每天9点</button>
        <button class="preset-btn" onclick="setCron('0 9 * * 1-5')">工作日9点</button>
        <button class="preset-btn" onclick="setCron('0 9 * * 1')">每周一9点</button>
        <button class="preset-btn" onclick="setCron('0 0 1 * *')">每月1号0点</button>
        <button class="preset-btn" onclick="setCron('0 0 1 1 *')">每年1月1日</button>
        <button class="preset-btn" onclick="setCron('*/5 * * * *')">每5分钟</button>
        <button class="preset-btn" onclick="setCron('*/15 * * * *')">每15分钟</button>
        <button class="preset-btn" onclick="setCron('0 */2 * * *')">每2小时</button>
        <button class="preset-btn" onclick="setCron('30 18 * * 5')">周五下午6:30</button>
        <button class="preset-btn" onclick="setCron('0 0 * * *')">每天午夜</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">解释 & 下次执行时间</div>
    <div class="card-body">
      <div id="human-desc" class="human-desc" style="margin-bottom:14px">加载中...</div>
      <p style="font-size:12px;color:#8b90a7;margin-bottom:10px">下次执行时间（未来5次）：</p>
      <ul class="next-runs" id="next-runs"></ul>
    </div>
  </div>
</div>

<script>
function onCronChange() {
  const cron = document.getElementById('cron-input').value.trim();
  const parts = cron.split(/\s+/);
  if (parts.length >= 5) {
    document.getElementById('f-min').value = parts[0];
    document.getElementById('f-hour').value = parts[1];
    document.getElementById('f-day').value = parts[2];
    document.getElementById('f-month').value = parts[3];
    document.getElementById('f-week').value = parts[4];
  }
  updateDesc();
}

function buildCron() {
  const min = document.getElementById('f-min').value || '*';
  const hour = document.getElementById('f-hour').value || '*';
  const day = document.getElementById('f-day').value || '*';
  const month = document.getElementById('f-month').value || '*';
  const week = document.getElementById('f-week').value || '*';
  document.getElementById('cron-input').value = `${min} ${hour} ${day} ${month} ${week}`;
  updateDesc();
}

function setCron(cron) {
  document.getElementById('cron-input').value = cron;
  onCronChange();
}

function describeCron(parts) {
  const [min, hour, day, month, week] = parts;
  let desc = '';

  if (min === '*' && hour === '*') desc = '每分钟';
  else if (min.startsWith('*/')) desc = `每 ${min.slice(2)} 分钟`;
  else if (hour.startsWith('*/')) desc = `每 ${hour.slice(2)} 小时的 ${min} 分`;
  else {
    const hourDesc = hour === '*' ? '每小时' : `${hour}点`;
    const minDesc = min === '0' ? '整' : `${min}分`;
    desc = `每天 ${hourDesc}${minDesc}`;
  }

  if (week !== '*') {
    const dayNames = ['周日','周一','周二','周三','周四','周五','周六'];
    if (week.includes('-')) {
      const [s, e] = week.split('-');
      desc = desc.replace('每天', `每${dayNames[+s]}到${dayNames[+e]}`);
    } else if (week.includes(',')) {
      desc = desc.replace('每天', week.split(',').map(d => dayNames[+d]).join('、'));
    } else {
      desc = desc.replace('每天', dayNames[+week] || `周${week}`);
    }
  }
  if (day !== '*' && day !== '?') desc += ` 的第${day}天`;
  if (month !== '*') desc += ` （${month}月）`;

  return desc;
}

// 简单的 cron 下次运行时间计算（近似）
function getNextRuns(cron, count = 5) {
  try {
    const parts = cron.trim().split(/\s+/);
    if (parts.length < 5) return [];
    const [min, hour, day, month, week] = parts;
    
    const results = [];
    let d = new Date();
    d.setSeconds(0, 0);
    d.setMinutes(d.getMinutes() + 1);
    
    let iterations = 0;
    while (results.length < count && iterations < 100000) {
      iterations++;
      if (matchCron(d, min, hour, day, month, week)) {
        results.push(new Date(d));
      }
      d.setMinutes(d.getMinutes() + 1);
    }
    return results;
  } catch(e) {
    return [];
  }
}

function matchCron(date, min, hour, day, month, week) {
  return matchField(date.getMinutes(), min, 0, 59) &&
    matchField(date.getHours(), hour, 0, 23) &&
    matchField(date.getDate(), day, 1, 31) &&
    matchField(date.getMonth() + 1, month, 1, 12) &&
    (week === '*' || matchField(date.getDay(), week, 0, 7));
}

function matchField(val, expr, min, max) {
  if (expr === '*' || expr === '?') return true;
  if (expr.includes('/')) {
    const [base, step] = expr.split('/');
    const start = base === '*' ? min : parseInt(base);
    const s = parseInt(step);
    for (let i = start; i <= max; i += s) if (i === val) return true;
    return false;
  }
  if (expr.includes('-')) {
    const [s, e] = expr.split('-').map(Number);
    return val >= s && val <= e;
  }
  if (expr.includes(',')) {
    return expr.split(',').map(Number).includes(val);
  }
  return parseInt(expr) === val || (expr === '7' && val === 0);
}

function updateDesc() {
  const cron = document.getElementById('cron-input').value.trim();
  const parts = cron.split(/\s+/);
  
  if (parts.length < 5) {
    document.getElementById('human-desc').textContent = '表达式格式有误，需要 5 个字段';
    document.getElementById('next-runs').innerHTML = '';
    return;
  }

  const desc = describeCron(parts);
  document.getElementById('human-desc').textContent = '📅 ' + desc;

  const runs = getNextRuns(cron);
  const now = Date.now();
  document.getElementById('next-runs').innerHTML = runs.map((d, i) => {
    const diff = Math.floor((d.getTime() - now) / 1000);
    const rel = diff < 60 ? `${diff}秒后` : diff < 3600 ? `${Math.floor(diff/60)}分钟后` : diff < 86400 ? `${Math.floor(diff/3600)}小时后` : `${Math.floor(diff/86400)}天后`;
    return `<li class="run-item">
      <span class="run-idx">#${i+1}</span>
      <span class="run-time">${d.toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'})}</span>
      <span class="run-rel">${rel}</span>
    </li>`;
  }).join('');
}

onCronChange();
</script>
</body>
</html>
