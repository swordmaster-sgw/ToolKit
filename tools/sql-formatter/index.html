<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL 格式化</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { margin-left: auto; padding: 6px 14px; background: transparent; border: 1px solid #2d3148; color: #8b90a7; border-radius: 6px; font-size: 13px; text-decoration: none; transition: all .2s; }
    .back-btn:hover { border-color: #6366f1; color: #6366f1; }
    .main { padding: 20px; max-width: 1100px; margin: 0 auto; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 10px; overflow: hidden; }
    .card-title { padding: 10px 16px; background: #1f2235; font-size: 12px; font-weight: 600; color: #8b90a7; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #2d3148; display: flex; justify-content: space-between; align-items: center; }
    .copy-btn { padding: 3px 10px; background: #2d3148; border: none; border-radius: 4px; color: #8b90a7; cursor: pointer; font-size: 11px; }
    .copy-btn:hover { background: #6366f1; color: #fff; }
    textarea { width: 100%; background: #131520; color: #e2e8f0; border: none; padding: 16px; font-family: 'Cascadia Code', monospace; font-size: 13px; resize: vertical; outline: none; min-height: 200px; line-height: 1.6; }
    .btn-row { padding: 12px 16px; display: flex; gap: 8px; background: #1a1d2e; border-top: 1px solid #2d3148; flex-wrap: wrap; }
    .btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #5457d4; }
    .btn-secondary { background: #2d3148; color: #c4c9e2; }
    .btn-secondary:hover { background: #363b5e; }
    .sql-keyword { color: #ff7b72; }
    .sql-func { color: #79c0ff; }
    .sql-str { color: #a5d6ff; }
    .sql-num { color: #ffa657; }
    .sql-comment { color: #4a4f6a; }
    @media (max-width: 768px) { .grid2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="header">
  <span style="font-size:22px">🗄️</span>
  <div>
    <h1 style="font-size:16px;font-weight:600">SQL 格式化</h1>
    <p style="font-size:12px;color:#8b90a7;margin-top:2px">美化/压缩，支持多种 SQL 方言</p>
  </div>
  <a class="back-btn" href="../../index.html">← 返回工具集</a>
</div>

<div class="main">
  <div class="grid2">
    <div class="card">
      <div class="card-title">
        输入 SQL
        <button class="copy-btn" onclick="copyArea('sql-in')">复制</button>
      </div>
      <textarea id="sql-in" placeholder="输入 SQL 语句..."></textarea>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="loadSample()">📋 示例</button>
        <button class="btn btn-secondary" onclick="document.getElementById('sql-in').value=''">🗑️ 清空</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        输出 SQL
        <button class="copy-btn" onclick="copyArea('sql-out')">复制</button>
      </div>
      <textarea id="sql-out" readonly placeholder="格式化结果将显示在此..."></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="format()">✨ 格式化</button>
        <button class="btn btn-primary" onclick="minify()">📦 压缩</button>
      </div>
    </div>
  </div>
</div>

<script>
const KEYWORDS = ['SELECT','FROM','WHERE','JOIN','LEFT','RIGHT','INNER','OUTER','ON','GROUP','BY','HAVING','ORDER','LIMIT','OFFSET','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','DROP','ALTER','ADD','COLUMN','CONSTRAINT','PRIMARY','KEY','FOREIGN','UNIQUE','INDEX','VIEW','AND','OR','NOT','IN','BETWEEN','LIKE','IS','NULL','CASE','WHEN','THEN','ELSE','END','UNION','DISTINCT','ALL','AS','WITH','RECURSIVE'];
const FUNCTIONS = ['COUNT','SUM','AVG','MIN','MAX','LOWER','UPPER','SUBSTR','LENGTH','TRIM','ROUND','ABS','NOW','DATE','CONCAT','REPLACE','COALESCE','IF','IFNULL'];

function formatSQL(sql) {
  let result = sql.trim();
  
  // 移除多余空格和换行
  result = result.replace(/\s+/g, ' ');
  
  // 关键字前后换行
  KEYWORDS.forEach(kw => {
    const regex = new RegExp(`\\b${kw}\\b`, 'gi');
    result = result.replace(regex, '\n' + kw);
  });

  // 逗号后换行
  result = result.replace(/,/g, ',\n');

  // 清理多余换行
  result = result.replace(/\n\s*\n/g, '\n').trim();

  // 缩进
  const lines = result.split('\n');
  let indent = 0;
  result = lines.map(line => {
    const trimmed = line.trim();
    if (trimmed.match(/^(FROM|WHERE|GROUP|ORDER|LIMIT|JOIN|LEFT|RIGHT|INNER|ON|UNION|HAVING)/i)) indent = 1;
    if (trimmed.match(/^(SELECT|INSERT|UPDATE|DELETE|CREATE|DROP|ALTER)/i)) indent = 0;
    return ' '.repeat(indent * 2) + trimmed;
  }).join('\n');

  return result;
}

function minifySQL(sql) {
  let result = sql.trim();
  result = result.replace(/\s+/g, ' ');
  result = result.replace(/\s*([(),])\s*/g, '$1');
  return result;
}

function format() {
  const input = document.getElementById('sql-in').value;
  document.getElementById('sql-out').value = formatSQL(input);
}

function minify() {
  const input = document.getElementById('sql-in').value;
  document.getElementById('sql-out').value = minifySQL(input);
}

function copyArea(id) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.value);
}

function loadSample() {
  document.getElementById('sql-in').value = `SELECT u.id, u.name, u.email, COUNT(o.id) as order_count, SUM(o.total_amount) as total_spent FROM users u LEFT JOIN orders o ON u.id = o.user_id WHERE u.status = 'active' AND u.created_at > '2026-01-01' GROUP BY u.id, u.name, u.email HAVING COUNT(o.id) > 0 ORDER BY total_spent DESC LIMIT 10`;
  format();
}

// 双向绑定
document.getElementById('sql-in').addEventListener('input', () => {
  const input = document.getElementById('sql-in').value;
  if (input.length > 100 && !input.includes('\n')) {
    document.getElementById('sql-out').value = formatSQL(input);
  }
});
</script>
</body>
</html>
