<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>依赖包安全扫描器 - ToolKit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding: 25px; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(94, 234, 212, 0.1); }
        .header h1 { font-size: 2.2em; margin-bottom: 10px; background: linear-gradient(135deg, #5eead4 0%, #38bdf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #94a3b8; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .project-input { flex: 1; min-width: 300px; padding: 12px; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(94, 234, 212, 0.2); border-radius: 10px; color: #e2e8f0; }
        .btn { padding: 10px 16px; background: linear-gradient(135deg, #0ea5e9 0%, #0d9488 100%); color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(14, 165, 233, 0.3); }
        .btn-secondary { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(94, 234, 212, 0.2); }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-warning { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: rgba(30, 41, 59, 0.5); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid rgba(94, 234, 212, 0.1); }
        .stat-value { font-size: 2em; font-weight: bold; color: #5eead4; margin-bottom: 5px; }
        .stat-label { color: #94a3b8; font-size: 0.9em; }
        .scan-results { max-height: 600px; overflow-y: auto; }
        .package-item { background: rgba(30, 41, 59, 0.5); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(94, 234, 212, 0.1); }
        .package-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .package-name { font-weight: 600; color: #5eead4; }
        .severity-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.75em; font-weight: 500; }
        .severity-critical { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .severity-high { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .severity-medium { background: rgba(147, 197, 253, 0.2); color: #93c5fd; }
        .severity-low { background: rgba(203, 213, 225, 0.2); color: #cbd5e1; }
        .package-meta { display: flex; gap: 15px; font-size: 0.85em; color: #94a3b8; margin-bottom: 8px; }
        .vulnerability-list { margin-top: 10px; }
        .vulnerability-item { background: rgba(15, 23, 42, 0.6); padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #f59e0b; }
        .vulnerability-critical { border-left-color: #ef4444; }
        .vulnerability-high { border-left-color: #f59e0b; }
        .vulnerability-medium { border-left-color: #0ea5e9; }
        .outdated-badge { background: rgba(245, 158, 11, 0.2); color: #f59e0b; padding: 2px 6px; border-radius: 10px; font-size: 0.7em; }
        .update-available { background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 2px 6px; border-radius: 10px; font-size: 0.7em; }
        .progress-bar { background: rgba(30, 41, 59, 0.8); height: 8px; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #0ea5e9); transition: width 0.3s ease; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: rgba(15, 23, 42, 0.9); color: #f8fafc; padding: 16px 24px; border-radius: 10px; border: 1px solid rgba(94, 234, 212, 0.2); transform: translateY(100px); opacity: 0; transition: all 0.3s ease; }
        .toast.show { transform: translateY(0); opacity: 1; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 依赖包安全扫描器</h1>
            <p>扫描项目依赖包安全漏洞，识别过时版本，提供修复建议，支持离线缓存</p>
        </div>

        <div class="controls">
            <input type="text" class="project-input" id="projectPath" placeholder="项目路径（如：./my-project 或选择 package.json）" value="./">
            <button class="btn" onclick="selectPackageJson()">📄 选择 package.json</button>
            <button class="btn btn-secondary" onclick="scanDependencies()">🔍 扫描依赖</button>
            <button class="btn btn-secondary" onclick="updateVulnerabilityDB()">🔄 更新漏洞库</button>
            <button class="btn btn-success" onclick="generateReport()">📊 生成报告</button>
        </div>

        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-value" id="totalPackages">0</div>
                <div class="stat-label">总包数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="vulnerablePackages">0</div>
                <div class="stat-label">漏洞包</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="outdatedPackages">0</div>
                <div class="stat-label">过时包</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="riskScore">0</div>
                <div class="stat-label">风险评分</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="scanProgress" style="width: 0%"></div>
        </div>

        <div class="scan-results" id="scanResults">
            <div style="text-align: center; padding: 60px; color: #94a3b8;">
                <div style="font-size: 3em; margin-bottom: 15px;">🔒</div>
                <h3>开始扫描依赖包</h3>
                <p>选择项目并点击"扫描依赖"，检测安全漏洞和过时版本</p>
            </div>
        </div>
    </div>

    <script>
        let scanResults = [];
        let vulnerabilityDB = [];

        // 模拟漏洞数据库
        const mockVulnerabilities = [
            {
                package: 'lodash',
                vulnerability: 'Prototype Pollution',
                severity: 'high',
                vulnerableVersions: '<4.17.12',
                patchedVersions: '>=4.17.12',
                description: 'lodash存在原型污染漏洞，可能导致远程代码执行'
            },
            {
                package: 'axios',
                vulnerability: 'Server-Side Request Forgery (SSRF)',
                severity: 'medium',
                vulnerableVersions: '<0.21.1',
                patchedVersions: '>=0.21.1',
                description: 'axios存在SSRF漏洞，可能允许攻击者访问内部资源'
            },
            {
                package: 'webpack',
                vulnerability: 'Denial of Service',
                severity: 'medium',
                vulnerableVersions: '<5.0.0',
                patchedVersions: '>=5.0.0',
                description: 'webpack在处理大型文件时可能导致DoS'
            }
        ];

        // 模拟项目依赖
        const mockDependencies = [
            { name: 'lodash', version: '4.17.11', latest: '4.17.21', outdated: true },
            { name: 'react', version: '18.2.0', latest: '18.2.0', outdated: false },
            { name: 'axios', version: '0.21.0', latest: '1.2.0', outdated: true },
            { name: 'express', version: '4.18.0', latest: '4.18.2', outdated: true },
            { name: 'webpack', version: '4.44.2', latest: '5.75.0', outdated: true }
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            vulnerabilityDB = [...mockVulnerabilities];
            showToast('✅ 依赖包安全扫描器已就绪', 3000);
        });

        // 扫描依赖
        function scanDependencies() {
            const projectPath = document.getElementById('projectPath').value;
            if (!projectPath) {
                showToast('❌ 请输入项目路径', 3000);
                return;
            }
            
            showToast(`🔍 正在扫描: ${projectPath}`, 2000);
            
            // 模拟扫描进度
            let progress = 0;
            const progressBar = document.getElementById('scanProgress');
            const interval = setInterval(() => {
                progress += 20;
                progressBar.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        generateScanResults();
                        progressBar.style.width = '0%';
                    }, 500);
                }
            }, 300);
        }

        // 生成扫描结果
        function generateScanResults() {
            scanResults = mockDependencies.map(dep => {
                const vulnerabilities = vulnerabilityDB.filter(v => v.package === dep.name && dep.version < v.patchedVersions);
                const maxSeverity = vulnerabilities.length > 0 ? Math.max(...vulnerabilities.map(v => severityLevel(v.severity))) : 0;
                
                return {
                    ...dep,
                    vulnerabilities: vulnerabilities,
                    riskLevel: maxSeverity,
                    safe: vulnerabilities.length === 0
                };
            });
            
            renderResults();
            updateStats();
            showToast('✅ 扫描完成', 3000);
        }

        // 渲染结果
        function renderResults() {
            const container = document.getElementById('scanResults');
            
            container.innerHTML = scanResults.map(pkg => `
                <div class="package-item">
                    <div class="package-header">
                        <div class="package-name">📦 ${pkg.name}</div>
                        <div style="display: flex; gap: 5px; align-items: center;">
                            ${pkg.outdated ? '<span class="outdated-badge">过时</span>' : ''}
                            ${pkg.vulnerabilities.length > 0 ? `<span class="severity-badge severity-${pkg.vulnerabilities[0].severity}">${pkg.vulnerabilities.length}个漏洞</span>` : '<span class="update-available">✅ 安全</span>'}
                        </div>
                    </div>
                    
                    <div class="package-meta">
                        <span>📌 当前: ${pkg.version}</span>
                        <span>🆕 最新: ${pkg.latest}</span>
                        ${pkg.outdated ? '<span>⚠️ 需要更新</span>' : ''}
                    </div>
                    
                    ${pkg.vulnerabilities.length > 0 ? `
                        <div class="vulnerability-list">
                            <strong style="color: #f59e0b; margin-bottom: 5px; display: block;">🔒 安全漏洞:</strong>
                            ${pkg.vulnerabilities.map(v => `
                                <div class="vulnerability-item vulnerability-${v.severity}">
                                    <strong>${v.vulnerability}</strong> (${v.severity})<br>
                                    ${v.description}<br>
                                    <small>影响版本: ${v.vulnerableVersions} | 修复版本: ${v.patchedVersions}</small>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    
                    ${pkg.outdated ? `
                        <div style="margin-top: 10px;">
                            <button class="btn btn-success btn-sm" style="font-size: 0.8em; padding: 5px 10px;" onclick="updatePackage('${pkg.name}')">🔄 更新到 ${pkg.latest}</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalPackages').textContent = scanResults.length;
            document.getElementById('vulnerablePackages').textContent = scanResults.filter(p => p.vulnerabilities.length > 0).length;
            document.getElementById('outdatedPackages').textContent = scanResults.filter(p => p.outdated).length;
            
            const riskScore = scanResults.reduce((score, pkg) => {
                return score + (pkg.vulnerabilities.length > 0 ? pkg.vulnerabilities.reduce((s, v) => s + severityLevel(v.severity), 0) : 0);
            }, 0);
            document.getElementById('riskScore').textContent = riskScore;
        }

        // 严重级别转换
        function severityLevel(severity) {
            const levels = { low: 1, medium: 2, high: 3, critical: 4 };
            return levels[severity] || 0;
        }

        // 选择package.json
        function selectPackageJson() {
            showToast('📄 请选择package.json文件', 3000);
        }

        // 更新漏洞库
        function updateVulnerabilityDB() {
            showToast('🔄 正在更新漏洞数据库...', 3000);
            setTimeout(() => {
                showToast('✅ 漏洞库已更新', 3000);
            }, 2000);
        }

        // 生成报告
        function generateReport() {
            const report = {
                timestamp: new Date().toISOString(),
                totalPackages: scanResults.length,
                vulnerablePackages: scanResults.filter(p => p.vulnerabilities.length > 0).length,
                outdatedPackages: scanResults.filter(p => p.outdated).length,
                riskScore: scanResults.reduce((score, pkg) => {
                    return score + (pkg.vulnerabilities.length > 0 ? pkg.vulnerabilities.reduce((s, v) => s + severityLevel(v.severity), 0) : 0);
                }, 0),
                details: scanResults
            };
            
            const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `security-report-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('📊 安全报告已生成', 3000);
        }

        // 更新包
        function updatePackage(name) {
            showToast(`🔄 正在更新 ${name}...`, 3000);
            setTimeout(() => {
                showToast(`✅ ${name} 已更新到最新版本`, 3000);
            }, 2000);
        }

        // 显示提示
        function showToast(message, duration = 3000) {
            const toast = document.createElement('div');
            toast.className = 'toast show';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, duration);
        }
    </script>
</body>
</html>
