<script>
function parseMarkdown(md) {
  let html = md;

  // 转义
  html = html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // 代码块
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code class="language-${lang}">${code.trim()}</code></pre>`
  );

  // 行内代码
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // 标题
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // 粗体和斜体
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
  html = html.replace(/_(.+?)_/g, '<em>$1</em>');

  // 链接
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

  // 分割线
  html = html.replace(/^---+$/gm, '<hr>');

  // 引用
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

  // 表格简单处理
  html = html.replace(/^\|(.+)\|$/gm, '<tr><td>' + '$1'.split('|').slice(1,-1).join('</td><td>') + '</td></tr>');
  html = html.replace(/(<tr>[\s\S]*?<\/tr>)/g, (match) => {
    const isHeader = match.includes('---');
    if (isHeader) return '';
    const first = match.indexOf('<tr>');
    return first === 0 ? '<table>' + match + '</table>' : match;
  });

  // 列表
  html = html.replace(/((?:^  [*\-+] .+\n?)+)/gm, (match) => {
    const items = match.trim().split('\n').map(l => '<li>' + l.replace(/^  [*\-+] /, '') + '</li>').join('');
    return '<ul style="margin-left:40px">' + items + '</ul>';
  });
  html = html.replace(/((?:^[*\-+] .+\n?)+)/gm, (match) => {
    if (/^  /.test(match)) return match;
    const items = match.trim().split('\n').map(l => '<li>' + l.replace(/^[*\-+] /, '') + '</li>').join('');
    return '<ul>' + items + '</ul>';
  });

  // 有序列表
  html = html.replace(/((?:^\d+\. .+\n?)+)/gm, (match) => {
    const items = match.trim().split('\n').map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>').join('');
    return '<ol>' + items + '</ol>';
  });

  // 段落
  html = html.split('\n\n').map(block => {
    block = block.trim();
    if (!block) return '';
    if (/^<[h1-6|ul|ol|pre|blockquote|hr|table]/.test(block)) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');

  return html;
}

function render() {
  const md = document.getElementById('md-input').value;
  const html = parseMarkdown(md);
  document.getElementById('md-preview').innerHTML = html;
}

function copyCode() {
  const v = document.getElementById('md-input').value;
  navigator.clipboard.writeText(v).then(() => alert('已复制 Markdown 代码'));
}

function copyPreview() {
  const v = document.getElementById('md-preview').innerHTML;
  navigator.clipboard.writeText(v).then(() => alert('已复制 HTML'));
}

function loadSample() {
